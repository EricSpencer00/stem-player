<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stem Player</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
<style>
:root {
  --page:       oklch(92% 0.012 84);
  --page-2:     oklch(89% 0.014 82);
  --device-out: oklch(84% 0.018 78);
  --device-in:  oklch(88% 0.013 80);
  --center:     oklch(81% 0.020 74);
  --ink:        oklch(24% 0.012 64);
  --ink-soft:   oklch(42% 0.011 68);
  --ink-faint:  oklch(54% 0.010 70);   /* darkened for WCAG text contrast */
  --ink-ghost:  oklch(70% 0.009 74);   /* decorative only, never text */
  --track:      oklch(78% 0.012 76);
  --amber:      oklch(64% 0.13 64);
  --amber-glow: oklch(64% 0.13 64 / 0.4);
  --wave-bg:    oklch(85% 0.013 78);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background:
    radial-gradient(120% 90% at 50% 0%, var(--page) 0%, var(--page-2) 100%);
  color: var(--ink);
  font-family: 'Helvetica Neue', 'Inter', Arial, sans-serif;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  justify-content: safe center;   /* don't clip top when content overflows short screens */
  padding: 32px 20px 40px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.wordmark {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 34px;
}
.wordmark span {
  font-size: 10px;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-indent: 0.55em;
}
.wordmark .rule {
  width: 26px;
  height: 1px;
  background: var(--ink-faint);
}

/* ── device ── */
.device-wrap {
  position: relative;
  width:  min(480px, 88vw);
  height: min(480px, 88vw);
  margin-bottom: 30px;
}

.device {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(80% 80% at 38% 32%, var(--device-in) 0%, var(--device-out) 78%);
  box-shadow:
    inset 0 3px 6px oklch(98% 0 0 / 0.5),
    inset 0 -4px 9px oklch(20% 0.01 60 / 0.10),
    0 16px 50px oklch(24% 0.012 70 / 0.18),
    0 4px 12px oklch(24% 0.012 70 / 0.10);
  transition: box-shadow 0.3s cubic-bezier(0.22,1,0.36,1);
}
.device.drag-active {
  box-shadow:
    inset 0 3px 6px oklch(98% 0 0 / 0.55),
    inset 0 -4px 9px oklch(20% 0.01 60 / 0.12),
    0 22px 64px oklch(24% 0.012 70 / 0.24),
    0 6px 16px oklch(24% 0.012 70 / 0.14);
}

/* SVG overlay for rings + arcs */
.svg-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}
.ring-track { fill: none; stroke: var(--track); stroke-width: 2; }
.ring-fill  { fill: none; stroke: var(--ink); stroke-width: 2; stroke-linecap: round;
              transition: stroke-dashoffset 0.12s linear; }
.vol-track  { fill: none; stroke: var(--track); stroke-width: 4; stroke-linecap: round; }
.vol-fill   { fill: none; stroke: var(--ink); stroke-width: 4; stroke-linecap: round;
              transition: stroke-dasharray 0.07s ease-out; }
.vol-fill.muted { stroke: var(--ink-ghost); }
.vol-fill.looping { stroke: var(--amber); }
.divider    { stroke: var(--track); stroke-width: 1; }

/* ── quadrant hit areas ── */
.quadrant {
  position: absolute;
  width: 50%;
  height: 50%;
  cursor: grab;
  z-index: 5;
  background: none;
  border: none;
  padding: 0;
  touch-action: none;            /* vertical drag = volume, not page scroll */
  -webkit-user-select: none;
  border-radius: 0;
  transition: background 0.18s;
}
.quadrant:active { cursor: grabbing; }
.device:hover .quadrant:hover { background: oklch(100% 0 0 / 0.05); }
.q-drums  { top: 0; left: 0;  border-top-left-radius: 100%; }
.q-vocals { top: 0; right: 0; border-top-right-radius: 100%; }
.q-bass   { bottom: 0; left: 0;  border-bottom-left-radius: 100%; }
.q-melody { bottom: 0; right: 0; border-bottom-right-radius: 100%; }
.quadrant:focus-visible {
  outline: none;
  background: oklch(100% 0 0 / 0.08);
  box-shadow: inset 0 0 0 2px var(--amber);
}

/* ── labels ── */
.q-label {
  position: absolute;
  font-size: 9.5px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink-soft);
  z-index: 6;
  pointer-events: none;
  text-indent: 0.26em;
  transition: color 0.2s, opacity 0.2s;
}
.q-label { text-align: center; transform: translate(-50%,-50%); }
#lbl-drums  { left: 20%; top: 21%; }
#lbl-vocals { left: 80%; top: 21%; }
#lbl-bass   { left: 20%; top: 79%; }
#lbl-melody { left: 80%; top: 79%; }
.q-label.muted { color: var(--ink-faint); opacity: 0.55; }
.q-label .pct {
  display: block;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-top: 3px;
  text-indent: 0.1em;
}

/* muted quadrant gets a faint diagonal wash */
.quadrant.muted { background: oklch(20% 0.01 60 / 0.05); }

/* small mute glyph shown over a muted quadrant */
.q-mute-mark {
  position: absolute;
  font-size: 11px;
  color: var(--ink-soft);
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.q-mute-mark.on { opacity: 0.8; }
.q-mute-mark { transform: translate(-50%,-50%); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; }
#mm-drums  { left: 20%; top: 31%; }
#mm-vocals { left: 80%; top: 31%; }
#mm-bass   { left: 20%; top: 69%; }
#mm-melody { left: 80%; top: 69%; }

/* discoverability hint under the circle */
.hint {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-align: center;
  margin-bottom: 22px;
  text-indent: 0.14em;
}
@media (max-width: 540px) { .hint { font-size: 10px; } }

/* ── center ── */
.center {
  border: none;
  padding: 0;
  font-family: inherit;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 29%;
  height: 29%;
  border-radius: 50%;
  background: radial-gradient(75% 75% at 40% 35%, oklch(83% 0.018 76), var(--center));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  cursor: pointer;
  z-index: 10;
  box-shadow:
    inset 0 2px 5px oklch(98% 0 0 / 0.34),
    inset 0 -3px 6px oklch(20% 0.01 60 / 0.08),
    0 3px 12px oklch(24% 0.012 70 / 0.14);
  transition: box-shadow 0.2s, transform 0.12s cubic-bezier(0.22,1,0.36,1);
}
.center:hover {
  box-shadow:
    inset 0 2px 5px oklch(98% 0 0 / 0.4),
    inset 0 -3px 6px oklch(20% 0.01 60 / 0.09),
    0 6px 20px oklch(24% 0.012 70 / 0.2);
}
.center:active { transform: translate(-50%, -50%) scale(0.96); }
.center.drag-over {
  box-shadow:
    inset 0 0 0 2px var(--amber),
    inset 0 2px 5px oklch(98% 0 0 / 0.4),
    0 6px 24px oklch(24% 0.012 70 / 0.26);
}
.center-glyph {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.center-glyph svg { width: 100%; height: 100%; fill: var(--ink-soft); }
.center-hint {
  font-size: 7.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-indent: 0.22em;
  pointer-events: none;
}
@keyframes breathe {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  50%     { transform: translate(-50%,-50%) scale(1.018); }
}
.center.playing { animation: breathe 3.4s ease-in-out infinite; }

/* ── overlay ── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: oklch(92% 0.012 84 / 0.93);
  backdrop-filter: blur(5px);
  z-index: 100;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 18px;
}
#overlay.active { display: flex; }
.ov-title { font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--ink-soft); text-indent: 0.42em; }
.ov-msg   { font-size: 9px; letter-spacing: 0.06em; color: var(--ink-faint); max-width: 250px; text-align: center; line-height: 1.9; }
.prog-wrap { width: 210px; height: 2px; background: var(--track); position: relative; border-radius: 2px; overflow: hidden; }
.prog-fill { position: absolute; inset: 0; background: var(--ink); width: 0%; transition: width 0.3s ease; }

/* ── waveforms ── */
.wave-row { width: min(480px, 88vw); display: none; gap: 4px; margin-bottom: 16px; }
.wave-row.active { display: flex; }
.wave-cell { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.wave-cap { font-size: 7.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); text-align: center; text-indent: 0.2em; }
canvas.wave { width: 100%; height: 26px; background: var(--wave-bg); border-radius: 2px; }

/* ── playbar ── */
#playbar { width: min(480px, 88vw); display: none; flex-direction: column; gap: 11px; margin-bottom: 18px; }
#playbar.active { display: flex; }
.filename { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-indent: 0.2em; }
.timeline-wrap { height: 2px; background: var(--track); cursor: pointer; position: relative; border-radius: 2px; }
.timeline-fill { position: absolute; inset: 0; background: var(--ink); width: 0%; pointer-events: none; border-radius: 2px; }
.timeline-head { position: absolute; top: 50%; left: 0%; width: 9px; height: 9px; border-radius: 50%; background: var(--ink); transform: translate(-50%,-50%); pointer-events: none; transition: left 0.1s linear; box-shadow: 0 1px 3px oklch(24% 0.01 70 / 0.3); }
.time-row { display: flex; justify-content: space-between; font-size: 8px; letter-spacing: 0.12em; color: var(--ink-faint); }
.transport { display: flex; justify-content: center; align-items: center; gap: 10px; }
.tbtn {
  background: none; border: 1px solid var(--track); border-radius: 999px;
  font-family: inherit; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-soft); cursor: pointer;
  min-height: 40px; padding: 0 18px;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  text-indent: 0.18em;
}
.tbtn:hover { color: var(--ink); border-color: var(--ink-faint); }
.tbtn.primary { color: var(--page); background: var(--ink); border-color: var(--ink); font-size: 11px; letter-spacing: 0.22em; min-width: 96px; }
.tbtn.primary:hover { color: var(--page); background: var(--ink-soft); border-color: var(--ink-soft); }

/* ── stem panel ── */
#stems-panel { width: min(480px, 88vw); display: none; flex-direction: column; gap: 2px; }
#stems-panel.active { display: flex; }
.stem-row {
  display: grid;
  grid-template-columns: 52px 1fr auto auto;
  align-items: center; gap: 14px;
  padding: 10px 0; border-top: 1px solid var(--track);
}
.stem-name { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); text-indent: 0.2em; }

/* native range slider, themed */
input.vol {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 28px; background: transparent; cursor: pointer; margin: 0;
}
input.vol::-webkit-slider-runnable-track { height: 2px; background: var(--track); border-radius: 2px; }
input.vol::-moz-range-track { height: 2px; background: var(--track); border-radius: 2px; }
input.vol::-moz-range-progress { height: 2px; background: var(--ink); border-radius: 2px; }
input.vol::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%; background: var(--ink);
  margin-top: -8px; box-shadow: 0 1px 3px oklch(24% 0.01 70 / 0.35);
  transition: transform 0.12s;
}
input.vol::-moz-range-thumb {
  width: 18px; height: 18px; border: none; border-radius: 50%; background: var(--ink);
  box-shadow: 0 1px 3px oklch(24% 0.01 70 / 0.35);
}
input.vol:active::-webkit-slider-thumb { transform: scale(1.15); }
input.vol:focus-visible::-webkit-slider-thumb { box-shadow: 0 0 0 4px var(--amber-glow); }
input.vol.muted::-webkit-slider-thumb { background: var(--ink-ghost); }
input.vol.muted::-moz-range-thumb { background: var(--ink-ghost); }

/* mute button */
.stem-mute-btn {
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-soft); background: none; border: 1px solid var(--track); border-radius: 999px;
  font-family: inherit; cursor: pointer; min-height: 34px; min-width: 56px; padding: 0 10px;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.stem-mute-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
.stem-mute-btn[aria-pressed="true"] { color: var(--page); background: var(--ink-soft); border-color: var(--ink-soft); }

/* loop buttons */
.loop-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}
.loop-btn {
  font-family: inherit; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-soft); background: none; border: 1px solid var(--track); border-radius: 999px;
  min-height: 34px; padding: 0 8px; cursor: pointer; appearance: none; text-align: center;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}
.loop-btn.on { color: var(--amber); border-color: var(--amber); }
.loop-btn:hover { border-color: var(--ink-faint); }

/* global focus ring */
:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* mobile */
@media (max-width: 540px) {
  body { justify-content: flex-start; padding: 20px 14px 32px; }
  .stem-row { grid-template-columns: 48px 1fr auto; grid-template-areas: "name slider mute" "loop loop loop"; row-gap: 8px; }
  .stem-name { grid-area: name; }
  input.vol { grid-area: slider; }
  .stem-mute-btn { grid-area: mute; min-height: 40px; }
  .loop-row { grid-area: loop; display: flex; align-items: center; gap: 8px; }
  .tbtn { min-height: 44px; }
}

footer { margin-top: 26px; font-size: 8px; letter-spacing: 0.12em; color: var(--ink-faint); text-align: center; line-height: 2.1; }
footer a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
footer a:hover { border-color: var(--ink-faint); }

#fileInput { display: none; }

.sample-rows {
  width: min(480px, 88vw);
  margin: 0 auto 10px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
}
.sample-rows button {
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: none;
  color: var(--ink-soft);
  background: none;
  border: 1px solid var(--track);
  border-radius: 999px;
  padding: 8px;
}
.sample-rows button:hover { border-color: var(--ink-faint); }
</style>
</head>
<body>

<input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg,.flac">

<div class="wordmark"><div class="rule"></div><span>Stem Player</span><div class="rule"></div></div>

<div class="device-wrap" id="deviceWrap">
  <div class="device" id="device"></div>

  <svg class="svg-layer" id="svg" viewBox="0 0 1000 1000" aria-hidden="true">
    <!-- progress ring -->
    <circle class="ring-track" cx="500" cy="500" r="476"></circle>
    <circle class="ring-fill"  cx="500" cy="500" r="476" id="ringFill"
            pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"
            transform="rotate(-90 500 500)"></circle>
    <!-- dividers -->
    <line class="divider" x1="120" y1="500" x2="880" y2="500"></line>
    <line class="divider" x1="500" y1="120" x2="500" y2="880"></line>
    <!-- volume arcs injected by JS -->
    <g id="volArcs"></g>
  </svg>

  <button type="button" class="quadrant q-drums"  data-stem="drums"  aria-label="Drums: click to mute, drag up or down to change level"></button>
  <button type="button" class="quadrant q-vocals" data-stem="vocals" aria-label="Vocals: click to mute, drag up or down to change level"></button>
  <button type="button" class="quadrant q-bass"   data-stem="bass"   aria-label="Bass: click to mute, drag up or down to change level"></button>
  <button type="button" class="quadrant q-melody" data-stem="melody" aria-label="Melody: click to mute, drag up or down to change level"></button>

  <span class="q-mute-mark" id="mm-drums">muted</span>
  <span class="q-mute-mark" id="mm-vocals">muted</span>
  <span class="q-mute-mark" id="mm-bass">muted</span>
  <span class="q-mute-mark" id="mm-melody">muted</span>

  <div class="q-label" id="lbl-drums" aria-hidden="true">Drums<span class="pct" id="pct-drums">80</span></div>
  <div class="q-label" id="lbl-vocals" aria-hidden="true">Vocals<span class="pct" id="pct-vocals">80</span></div>
  <div class="q-label" id="lbl-bass" aria-hidden="true">Bass<span class="pct" id="pct-bass">80</span></div>
  <div class="q-label" id="lbl-melody" aria-hidden="true">Melody<span class="pct" id="pct-melody">80</span></div>

  <button type="button" class="center" id="center" aria-label="Drop or choose an audio file to separate">
    <span class="center-glyph" id="centerGlyph">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 20h14"
        stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="center-hint" id="centerHint">drop audio</span>
  </button>
</div>

<p class="hint" id="hint">Drop a track to begin</p>
<div class="sample-rows" id="sampleRows"></div>

<div class="wave-row" id="waveRow">
  <div class="wave-cell"><div class="wave-cap">Drums</div><canvas class="wave" id="wDrums"></canvas></div>
  <div class="wave-cell"><div class="wave-cap">Bass</div><canvas class="wave" id="wBass"></canvas></div>
  <div class="wave-cell"><div class="wave-cap">Vocals</div><canvas class="wave" id="wVocals"></canvas></div>
  <div class="wave-cell"><div class="wave-cap">Melody</div><canvas class="wave" id="wMelody"></canvas></div>
</div>

<div id="playbar">
  <div class="filename" id="filename"></div>
  <div class="timeline-wrap" id="timeline" role="slider" tabindex="0"
       aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="timeline-fill" id="timelineFill"></div>
    <div class="timeline-head" id="timelineHead"></div>
  </div>
  <div class="time-row"><span id="timeCur">0:00</span><span id="timeTot">0:00</span></div>
  <div class="transport">
    <button class="tbtn" id="btnRestart">restart</button>
    <button class="tbtn primary" id="btnPlay">play</button>
    <button class="tbtn" id="btnStop">stop</button>
  </div>
</div>

<div id="stems-panel">
  <div class="stem-row">
    <label class="stem-name" for="vol-drums">Drums</label>
    <input class="vol" type="range" id="vol-drums" data-stem="drums" min="0" max="100" value="80" aria-label="Drums volume">
    <button class="stem-mute-btn" data-stem="drums" aria-pressed="false" aria-label="Mute drums">mute</button>
    <div class="loop-row" data-stem="drums">
      <button type="button" class="loop-btn" data-loop="0" data-stem="drums" aria-label="Loop drums by 1 bar">1</button>
      <button type="button" class="loop-btn" data-loop="1" data-stem="drums" aria-label="Loop drums by 2 bars">2</button>
      <button type="button" class="loop-btn" data-loop="2" data-stem="drums" aria-label="Loop drums by 4 bars">4</button>
      <button type="button" class="loop-btn" data-loop="3" data-stem="drums" aria-label="Loop drums by 8 bars">8</button>
    </div>
  </div>
  <div class="stem-row">
    <label class="stem-name" for="vol-bass">Bass</label>
    <input class="vol" type="range" id="vol-bass" data-stem="bass" min="0" max="100" value="80" aria-label="Bass volume">
    <button class="stem-mute-btn" data-stem="bass" aria-pressed="false" aria-label="Mute bass">mute</button>
    <div class="loop-row" data-stem="bass">
      <button type="button" class="loop-btn" data-loop="0" data-stem="bass" aria-label="Loop bass by 1 bar">1</button>
      <button type="button" class="loop-btn" data-loop="1" data-stem="bass" aria-label="Loop bass by 2 bars">2</button>
      <button type="button" class="loop-btn" data-loop="2" data-stem="bass" aria-label="Loop bass by 4 bars">4</button>
      <button type="button" class="loop-btn" data-loop="3" data-stem="bass" aria-label="Loop bass by 8 bars">8</button>
    </div>
  </div>
  <div class="stem-row">
    <label class="stem-name" for="vol-vocals">Vocals</label>
    <input class="vol" type="range" id="vol-vocals" data-stem="vocals" min="0" max="100" value="80" aria-label="Vocals volume">
    <button class="stem-mute-btn" data-stem="vocals" aria-pressed="false" aria-label="Mute vocals">mute</button>
    <div class="loop-row" data-stem="vocals">
      <button type="button" class="loop-btn" data-loop="0" data-stem="vocals" aria-label="Loop vocals by 1 bar">1</button>
      <button type="button" class="loop-btn" data-loop="1" data-stem="vocals" aria-label="Loop vocals by 2 bars">2</button>
      <button type="button" class="loop-btn" data-loop="2" data-stem="vocals" aria-label="Loop vocals by 4 bars">4</button>
      <button type="button" class="loop-btn" data-loop="3" data-stem="vocals" aria-label="Loop vocals by 8 bars">8</button>
    </div>
  </div>
  <div class="stem-row">
    <label class="stem-name" for="vol-melody">Melody</label>
    <input class="vol" type="range" id="vol-melody" data-stem="melody" min="0" max="100" value="80" aria-label="Melody volume">
    <button class="stem-mute-btn" data-stem="melody" aria-pressed="false" aria-label="Mute melody">mute</button>
    <div class="loop-row" data-stem="melody">
      <button type="button" class="loop-btn" data-loop="0" data-stem="melody" aria-label="Loop melody by 1 bar">1</button>
      <button type="button" class="loop-btn" data-loop="1" data-stem="melody" aria-label="Loop melody by 2 bars">2</button>
      <button type="button" class="loop-btn" data-loop="2" data-stem="melody" aria-label="Loop melody by 4 bars">4</button>
      <button type="button" class="loop-btn" data-loop="3" data-stem="melody" aria-label="Loop melody by 8 bars">8</button>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title" id="ovTitle">Processing</div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
  <div class="ov-msg" id="ovMsg">Downloading Spleeter model. Cached after first use.</div>
</div>

<footer>
  UI inspired by <a href="https://krystalgamer.github.io/stem-player-emulator/" target="_blank" rel="noopener">krystalgamer</a>
  &nbsp;·&nbsp; ML: Spleeter / Deezer &nbsp;·&nbsp; HPSS &nbsp;·&nbsp; ONNX Runtime Web
</footer>

<script>
'use strict';

// ── constants ──
const FFT_SIZE  = 4096;
const HOP_SIZE  = 1024;
const SR        = 44100;
const TOT_BINS  = FFT_SIZE / 2 + 1;   // 2049
const MODEL_BINS = 1024;              // spleeter uses first 1024 bins
const SEG_FRAMES = 512;               // spleeter time-frames per segment
const LOOP_BARS = [1, 2, 4, 8];
const SAMPLE_TRACKS = [
  {name:'No-copyright sample loop 1', url:'./samples/stem-sample-1.mp3'},
  {name:'No-copyright sample loop 2', url:'./samples/stem-sample-2.mp3'},
  {name:'No-copyright sample loop 3', url:'./samples/stem-sample-3.mp3'},
];
const STEMS = ['drums','vocals','bass','melody'];
const HF = 'https://huggingface.co/csukuangfj/sherpa-onnx-spleeter-2stems/resolve/main/';

// quadrant angular ranges (screen deg, 0=east, 90=south, clockwise)
const Q_RANGE = {
  drums:  [180, 270],
  vocals: [270, 360],
  bass:   [ 90, 180],
  melody: [  0,  90],
};

// ── state ──
const state = {
  ready:false, playing:false,
  muted:  {drums:false,vocals:false,bass:false,melody:false},
  volume: {drums:0.8,vocals:0.8,bass:0.8,melody:0.8},
  loopDot:{drums:-1,vocals:-1,bass:-1,melody:-1},
  loopStart:{drums:0,vocals:0,bass:0,melody:0},
  loopEnd:{drums:0,vocals:0,bass:0,melody:0},
  loopBase:0,
  pauseOffset:0, startTime:0, duration:0, bpm:120, raf:null,
};
let audioCtx;
const gains={}, sources={}, buffers={};

// ── geometry helpers ──
function polar(angDeg, r){
  const a = angDeg * Math.PI/180;
  return [500 + Math.cos(a)*r, 500 + Math.sin(a)*r];
}
function arcPath(angle0, angle1, r){
  const [sx,sy] = polar(angle0, r);
  const [ex,ey] = polar(angle1, r);
  const large = (angle1-angle0) > 180 ? 1 : 0;
  return `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;
}

// build volume arcs + place labels & dots
function buildDevice(){
  const NS='http://www.w3.org/2000/svg';
  const g = document.getElementById('volArcs');
  g.innerHTML='';
  const VOL_R = 318, PAD = 7;

  STEMS.forEach(stem=>{
    const [a0,a1] = Q_RANGE[stem];
    const s = a0+PAD, e = a1-PAD;
    const track = document.createElementNS(NS,'path');
    track.setAttribute('class','vol-track');
    track.setAttribute('d', arcPath(s, e, VOL_R));
    g.appendChild(track);

    const fill = document.createElementNS(NS,'path');
    fill.setAttribute('class','vol-fill');
    fill.setAttribute('id','varc-'+stem);
    fill.setAttribute('d', arcPath(s, e, VOL_R));
    fill.setAttribute('pathLength','1');
    g.appendChild(fill);
    setVolArc(stem, state.volume[stem]);
  });
  // labels & mute-marks are positioned via CSS percentages (no flash, scales free)
}

function setVolArc(stem, v){
  const el = document.getElementById('varc-'+stem);
  if(el) el.setAttribute('stroke-dasharray', `${v.toFixed(4)} 1`);
}

function measureLength(){
  return (60/state.bpm) * 4;
}

function snapLoopStart(currentSec){
  const len = measureLength();
  if(!len || !Number.isFinite(currentSec) || !state.duration) return 0;
  return Math.floor(currentSec / len) * len;
}

function setLoop(stem, idx){
  state.loopDot[stem]=idx;
  const buttons = document.querySelectorAll(`.loop-row[data-stem="${stem}"] .loop-btn`);
  buttons.forEach((button)=>button.classList.toggle('on', Number(button.dataset.loop)===idx));

  if(idx < 0){
    document.getElementById(`varc-${stem}`).classList.remove('looping');
    if(state.playing)startPlayback(currentTime()%state.duration);
    return;
  }

  const len = measureLength();
  const start = snapLoopStart(currentTime()%state.duration);
  const end = start + LOOP_BARS[idx] * len;
  state.loopBase = start;

  if(end > state.duration){
    alert(`Loop too long for current selection. Try a smaller length or stay away from end of track.`);
    state.loopDot[stem] = -1;
    buttons.forEach((button)=>button.classList.toggle('on', false));
    return;
  }

  state.loopStart[stem] = start;
  state.loopEnd[stem] = end;
  document.getElementById(`varc-${stem}`).classList.add('looping');
  if(state.playing){startPlayback(currentTime()%state.duration);}
}

// ── FFT ──
function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5-0.5*Math.cos(2*Math.PI*i/N);return w;}
function fftIP(re,im){
  const N=re.length;
  for(let i=1,j=0;i<N;i++){let bit=N>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){[re[i],re[j]]=[re[j],re[i]];[im[i],im[j]]=[im[j],im[i]];}}
  for(let len=2;len<=N;len<<=1){const a=-2*Math.PI/len,wr0=Math.cos(a),wi0=Math.sin(a);
    for(let i=0;i<N;i+=len){let wr=1,wi=0;for(let j=0;j<len>>1;j++){const u=i+j,v=u+(len>>1);
      const tRe=wr*re[v]-wi*im[v],tIm=wr*im[v]+wi*re[v];
      re[v]=re[u]-tRe;im[v]=im[u]-tIm;re[u]+=tRe;im[u]+=tIm;
      const nr=wr*wr0-wi*wi0;wi=wr*wi0+wi*wr0;wr=nr;}}}
}
function ifftIP(re,im){for(let i=0;i<im.length;i++)im[i]=-im[i];fftIP(re,im);const N=re.length;for(let i=0;i<N;i++){re[i]/=N;im[i]=-im[i]/N;}}
function stft(sig,win){
  const F=Math.floor((sig.length-FFT_SIZE)/HOP_SIZE)+1;
  const re=[],im=[],fr=new Float32Array(FFT_SIZE),fi=new Float32Array(FFT_SIZE);
  for(let f=0;f<F;f++){const s=f*HOP_SIZE;
    for(let i=0;i<FFT_SIZE;i++){fr[i]=(s+i<sig.length?sig[s+i]:0)*win[i];fi[i]=0;}
    fftIP(fr,fi);
    re.push(new Float32Array(fr.subarray(0,TOT_BINS)));
    im.push(new Float32Array(fi.subarray(0,TOT_BINS)));
  }
  return {re,im,F};
}
function istft(re,im,F,win){
  const len=(F-1)*HOP_SIZE+FFT_SIZE,out=new Float32Array(len),nrm=new Float32Array(len);
  const fr=new Float32Array(FFT_SIZE),fi=new Float32Array(FFT_SIZE);
  for(let f=0;f<F;f++){
    for(let b=0;b<TOT_BINS;b++){fr[b]=re[f][b];fi[b]=im[f][b];}
    for(let b=1;b<TOT_BINS-1;b++){fr[FFT_SIZE-b]=fr[b];fi[FFT_SIZE-b]=-fi[b];}
    ifftIP(fr,fi);
    const s=f*HOP_SIZE;
    for(let i=0;i<FFT_SIZE;i++){out[s+i]+=fr[i]*win[i];nrm[s+i]+=win[i]*win[i];}
  }
  for(let i=0;i<len;i++)if(nrm[i]>1e-8)out[i]/=nrm[i];
  return out;
}

// ── HPSS ──
function medFilter(spec,F,B,L,axis){
  const out=new Float32Array(F*B),col=new Float32Array(L),h=L>>1;
  if(axis==='h'){for(let b=0;b<B;b++)for(let f=0;f<F;f++){for(let k=0;k<L;k++){const fi=f-h+k;col[k]=(fi>=0&&fi<F)?spec[fi*B+b]:0;}col.sort();out[f*B+b]=col[h];}}
  else{for(let f=0;f<F;f++)for(let b=0;b<B;b++){for(let k=0;k<L;k++){const bi=b-h+k;col[k]=(bi>=0&&bi<B)?spec[f*B+bi]:0;}col.sort();out[f*B+b]=col[h];}}
  return out;
}
function hpss(re,im,F,B){
  const mag=new Float32Array(F*B);
  for(let f=0;f<F;f++)for(let b=0;b<B;b++)mag[f*B+b]=re[f][b]**2+im[f][b]**2;
  const H=medFilter(mag,F,B,17,'h'),P=medFilter(mag,F,B,17,'v');
  const hRe=re.map(()=>new Float32Array(B)),hIm=im.map(()=>new Float32Array(B));
  const pRe=re.map(()=>new Float32Array(B)),pIm=im.map(()=>new Float32Array(B));
  for(let f=0;f<F;f++)for(let b=0;b<B;b++){const hh=H[f*B+b],pp=P[f*B+b],d=hh+pp+1e-8;
    hRe[f][b]=re[f][b]*hh/d;hIm[f][b]=im[f][b]*hh/d;
    pRe[f][b]=re[f][b]*pp/d;pIm[f][b]=im[f][b]*pp/d;}
  return {hRe,hIm,pRe,pIm};
}
function lowPass(re,im,F,B,hz){
  const cut=Math.round(hz/(SR/FFT_SIZE));
  const lRe=re.map(r=>new Float32Array(r)),lIm=im.map(r=>new Float32Array(r));
  const hRe=re.map(r=>new Float32Array(r)),hIm=im.map(r=>new Float32Array(r));
  for(let f=0;f<F;f++){for(let b=cut;b<B;b++){lRe[f][b]=0;lIm[f][b]=0;}for(let b=0;b<cut;b++){hRe[f][b]=0;hIm[f][b]=0;}}
  return {lRe,lIm,hRe,hIm};
}

// ── ONNX ──
let vSess=null, aSess=null;
async function loadModels(onProg){
  ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/';
  async function dl(url,s0,s1){
    const r=await fetch(url); if(!r.ok)throw new Error('HTTP '+r.status);
    const total=+r.headers.get('content-length')||0;
    const rd=r.body.getReader();const ch=[];let ld=0;
    while(true){const{done,value}=await rd.read();if(done)break;ch.push(value);ld+=value.length;if(total)onProg(s0+(s1-s0)*ld/total,'Downloading model…');}
    const b=new Uint8Array(ld);let o=0;for(const c of ch){b.set(c,o);o+=c.length;}return b.buffer;
  }
  onProg(0,'Downloading vocals model (39 MB)…');
  vSess=await ort.InferenceSession.create(await dl(HF+'vocals.onnx',0,46),{executionProviders:['wasm']});
  onProg(50,'Downloading accompaniment model (39 MB)…');
  aSess=await ort.InferenceSession.create(await dl(HF+'accompaniment.onnx',50,96),{executionProviders:['wasm']});
  onProg(100,'Models ready');
}

// ── pipeline ──
async function separateAudio(arrayBuf,onProg){
  onProg(0,'Decoding audio…');
  audioCtx=audioCtx||new AudioContext({sampleRate:SR});
  if(audioCtx.state==='suspended')await audioCtx.resume();
  const raw=await audioCtx.decodeAudioData(arrayBuf.slice(0));
  const nCh=raw.numberOfChannels;
  const sigL=raw.getChannelData(0), sigR=nCh>1?raw.getChannelData(1):sigL;

  onProg(5,'Computing spectrograms…');
  const win=hann(FFT_SIZE);
  const stL=stft(sigL,win), stR=stft(sigR,win);
  const F=stL.F;

  // magnitudes (low MODEL_BINS only needed for model)
  const magL=stL.re.map((r,f)=>{const m=new Float32Array(MODEL_BINS);for(let b=0;b<MODEL_BINS;b++)m[b]=Math.hypot(r[b],stL.im[f][b]);return m;});
  const magR=stR.re.map((r,f)=>{const m=new Float32Array(MODEL_BINS);for(let b=0;b<MODEL_BINS;b++)m[b]=Math.hypot(r[b],stR.im[f][b]);return m;});

  const vMask=new Float32Array(F*MODEL_BINS);  // vocal soft mask per (frame,bin)

  if(vSess&&aSess){
    const nSeg=Math.ceil(F/SEG_FRAMES);
    const segData=new Float32Array(2*SEG_FRAMES*MODEL_BINS);
    for(let seg=0;seg<nSeg;seg++){
      segData.fill(0);
      for(let fr=0;fr<SEG_FRAMES;fr++){
        const f=seg*SEG_FRAMES+fr; if(f>=F)break;
        const baseL=(0*SEG_FRAMES+fr)*MODEL_BINS, baseR=(1*SEG_FRAMES+fr)*MODEL_BINS;
        for(let b=0;b<MODEL_BINS;b++){segData[baseL+b]=magL[f][b];segData[baseR+b]=magR[f][b];}
      }
      const ve=(await vSess.run({x:new ort.Tensor('float32',segData,[2,1,SEG_FRAMES,MODEL_BINS])})).y.data;
      const ae=(await aSess.run({x:new ort.Tensor('float32',segData.slice(),[2,1,SEG_FRAMES,MODEL_BINS])})).y.data;
      for(let fr=0;fr<SEG_FRAMES;fr++){
        const f=seg*SEG_FRAMES+fr; if(f>=F)break;
        const bL=(0*SEG_FRAMES+fr)*MODEL_BINS, bR=(1*SEG_FRAMES+fr)*MODEL_BINS;
        for(let b=0;b<MODEL_BINS;b++){
          const vp=ve[bL+b]**2+ve[bR+b]**2, ap=ae[bL+b]**2+ae[bR+b]**2;
          vMask[f*MODEL_BINS+b]=vp/(vp+ap+1e-10);
        }
      }
      onProg(12+56*(seg+1)/nSeg,`Separating vocals… ${seg+1}/${nSeg}`);
    }
  } else {
    onProg(40,'DSP separation (model unavailable)…');
    for(let f=0;f<F;f++)for(let b=0;b<MODEL_BINS;b++){
      const l=magL[f][b],r=magR[f][b];
      vMask[f*MODEL_BINS+b]=Math.min(l,r)/(0.5*(l+r)+1e-8);
    }
  }

  onProg(70,'Applying masks…');
  const vRe=stL.re.map(()=>new Float32Array(TOT_BINS)), vIm=stL.im.map(()=>new Float32Array(TOT_BINS));
  const aRe=stL.re.map(()=>new Float32Array(TOT_BINS)), aIm=stL.im.map(()=>new Float32Array(TOT_BINS));
  for(let f=0;f<F;f++)for(let b=0;b<TOT_BINS;b++){
    const mRe=(stL.re[f][b]+stR.re[f][b])*0.5, mIm=(stL.im[f][b]+stR.im[f][b])*0.5;
    const vm = b<MODEL_BINS ? vMask[f*MODEL_BINS+b] : 0;  // high bins -> accompaniment
    vRe[f][b]=mRe*vm; vIm[f][b]=mIm*vm;
    aRe[f][b]=mRe*(1-vm); aIm[f][b]=mIm*(1-vm);
  }

  onProg(74,'Splitting drums & melody (HPSS)…');
  const {hRe,hIm,pRe,pIm}=hpss(aRe,aIm,F,TOT_BINS);
  onProg(82,'Extracting bass…');
  const {lRe:bsRe,lIm:bsIm,hRe:mlRe,hIm:mlIm}=lowPass(hRe,hIm,F,TOT_BINS,300);

  onProg(86,'Synthesizing stems…');
  const dur=raw.duration;
  const toAB=(re,im)=>{const sig=istft(re,im,F,win);const ab=audioCtx.createBuffer(1,Math.min(sig.length,Math.ceil(dur*SR)),SR);ab.copyToChannel(sig.subarray(0,ab.length),0);return ab;};
  buffers.drums=toAB(pRe,pIm);  onProg(89,'…');
  buffers.vocals=toAB(vRe,vIm); onProg(92,'…');
  buffers.bass=toAB(bsRe,bsIm); onProg(95,'…');
  buffers.melody=toAB(mlRe,mlIm);
  onProg(98,'Drawing waveforms…');
  STEMS.forEach(s=>drawWave(s));
  onProg(100,'Done');
  return dur;
}

// ── waveform ──
function drawWave(stem){
  const ids={drums:'wDrums',vocals:'wVocals',bass:'wBass',melody:'wMelody'};
  const c=document.getElementById(ids[stem]); const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  c.width=(c.offsetWidth||100)*dpr; c.height=26*dpr; ctx.scale(dpr,dpr);
  const w=c.offsetWidth||100,h=26;
  ctx.clearRect(0,0,w,h);
  const data=buffers[stem].getChannelData(0);
  const step=Math.ceil(data.length/w);
  const cs=getComputedStyle(document.documentElement);
  ctx.fillStyle=cs.getPropertyValue('--ink').trim()||'#333';
  for(let x=0;x<w;x++){let mx=0;for(let i=0;i<step;i++){const v=Math.abs(data[x*step+i]||0);if(v>mx)mx=v;}const bh=Math.max(0.7,mx*h);ctx.fillRect(x,(h-bh)/2,1,bh);}
}

// ── playback ──
function buildGains(){STEMS.forEach(s=>{gains[s]=audioCtx.createGain();gains[s].gain.value=state.muted[s]?0:state.volume[s];gains[s].connect(audioCtx.destination);});}
function startPlayback(off=0){
  stopPlayback(); buildGains();
  state.startTime=audioCtx.currentTime-off; state.playing=true;
  STEMS.forEach(s=>{const src=audioCtx.createBufferSource();src.buffer=buffers[s];src.connect(gains[s]);
    const d=state.loopDot[s];
    let startOffset=off;
    if(d>=0){
      const loopStart=state.loopStart[s];
      const loopEnd=state.loopEnd[s];
      if(loopEnd > loopStart){
        src.loop=true;
        src.loopStart=loopStart;
        src.loopEnd=loopEnd;
        if(startOffset >= loopEnd){startOffset=loopStart;}
      }
    }else{
      src.loop=false;
    }
    src.start(0,startOffset);
    sources[s]=src;});
  document.getElementById('center').classList.add('playing');
  setGlyph('pause'); document.getElementById('btnPlay').textContent='pause';
  document.getElementById('centerHint').textContent='playing';
  tick();
}
function stopPlayback(){
  if(state.raf){cancelAnimationFrame(state.raf);state.raf=null;}
  state.playing=false;
  STEMS.forEach(s=>{try{sources[s]&&sources[s].stop();}catch(e){}sources[s]=null;});
  STEMS.forEach(s=>{try{gains[s]&&gains[s].disconnect();}catch(e){}});
  document.getElementById('center').classList.remove('playing');
  if(state.ready){setGlyph('play');document.getElementById('btnPlay').textContent='play';document.getElementById('centerHint').textContent='play';}
}
function currentTime(){return state.playing?audioCtx.currentTime-state.startTime:state.pauseOffset;}
function tick(){const t=currentTime();if(t>=state.duration&&state.playing){stopPlayback();state.pauseOffset=0;updateUI(0);return;}updateUI(t);state.raf=requestAnimationFrame(tick);}
function updateUI(t){
  const pct=Math.max(0,Math.min(1,t/state.duration));
  document.getElementById('timelineFill').style.width=(pct*100)+'%';
  document.getElementById('timelineHead').style.left=(pct*100)+'%';
  document.getElementById('ringFill').setAttribute('stroke-dashoffset', (1-pct).toFixed(4));
  const tl=document.getElementById('timeline');
  tl.setAttribute('aria-valuenow', Math.round(pct*100));
  tl.setAttribute('aria-valuetext', fmt(t)+' of '+fmt(state.duration));
  document.getElementById('timeCur').textContent=fmt(t);
  document.getElementById('timeTot').textContent=fmt(state.duration);
}
function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return`${m}:${ss.toString().padStart(2,'0')}`;}

// glyph morph
function setGlyph(kind){
  const g=document.getElementById('centerGlyph');
  if(kind==='play')  g.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  else if(kind==='pause') g.innerHTML='<svg viewBox="0 0 24 24"><path d="M7 5h3.5v14H7zM13.5 5H17v14h-3.5z"/></svg>';
  else g.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 20h14" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

// ── volume / mute ──
function setVolume(stem,v,fromSlider){
  v=Math.max(0,Math.min(1,v));
  state.volume[stem]=v;
  if(gains[stem])gains[stem].gain.value=state.muted[stem]?0:v;
  setVolArc(stem,v);
  document.getElementById('pct-'+stem).textContent=Math.round(v*100);
  if(!fromSlider){const sl=document.getElementById('vol-'+stem);if(sl)sl.value=Math.round(v*100);}
}
function setMute(stem, muted){
  state.muted[stem]=muted;
  if(gains[stem])gains[stem].gain.value=muted?0:state.volume[stem];
  document.getElementById('lbl-'+stem).classList.toggle('muted',muted);
  document.querySelector(`.quadrant[data-stem="${stem}"]`).classList.toggle('muted',muted);
  document.getElementById('mm-'+stem).classList.toggle('on',muted);
  document.getElementById('varc-'+stem).classList.toggle('muted',muted);
  document.getElementById('vol-'+stem).classList.toggle('muted',muted);
  const btn=document.querySelector(`.stem-mute-btn[data-stem="${stem}"]`);
  btn.setAttribute('aria-pressed',String(muted));
  btn.textContent=muted?'muted':'mute';
}
function toggleMute(stem){ if(state.ready) setMute(stem,!state.muted[stem]); }

// quadrant: tap = mute, diagonal drag = volume (Pointer Events + capture)
STEMS.forEach(stem=>{
  const q=document.querySelector(`.quadrant[data-stem="${stem}"]`);
  let id=null,x0=0,y0=0,v0=0,moved=false;
  q.addEventListener('pointerdown',e=>{
    if(!state.ready)return;
    id=e.pointerId; x0=e.clientX; y0=e.clientY; v0=state.volume[stem]; moved=false;
    q.setPointerCapture(id);
  });
  q.addEventListener('pointermove',e=>{
    if(id!==e.pointerId)return;
    const dx=e.clientX-x0, dy=y0-e.clientY;            // diagonal motion: +dx and +dy increase
    const dv=(dx+dy)/220;
    if(Math.abs(dx)>4 || Math.abs(dy)>4) moved=true;
    if(moved) setVolume(stem,v0+dv);
  });
  function release(e){
    if(id!==e.pointerId)return;
    try{q.releasePointerCapture(id);}catch(_){}
    if(!moved) toggleMute(stem);            // it was a tap
    id=null;
  }
  q.addEventListener('pointerup',release);
  q.addEventListener('pointercancel',release);
  // keyboard: Enter/Space = mute, arrows = volume
  q.addEventListener('keydown',e=>{
    if(!state.ready)return;
    if(e.key==='ArrowUp'||e.key==='ArrowRight'){setVolume(stem,state.volume[stem]+0.05);e.preventDefault();}
    else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setVolume(stem,state.volume[stem]-0.05);e.preventDefault();}
    else if(e.key==='Enter'||e.key===' '){toggleMute(stem);e.preventDefault();}
  });
});

// panel sliders / mute / loop
document.querySelectorAll('input.vol').forEach(sl=>sl.addEventListener('input',()=>setVolume(sl.dataset.stem,sl.value/100,true)));
document.querySelectorAll('.stem-mute-btn').forEach(b=>b.addEventListener('click',()=>toggleMute(b.dataset.stem)));
document.querySelectorAll('.loop-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!state.ready) return;
    const stem=btn.dataset.stem;
    const loopIdx=Number(btn.dataset.loop);
    setLoop(stem, state.loopDot[stem]===loopIdx ? -1 : loopIdx);
  });
});

// transport
document.getElementById('btnPlay').addEventListener('click',()=>{
  if(!state.ready)return;
  if(!audioCtx)audioCtx=new AudioContext({sampleRate:SR});
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(state.playing){state.pauseOffset=currentTime();stopPlayback();}
  else startPlayback(state.pauseOffset);
});
document.getElementById('btnRestart').addEventListener('click',()=>{if(!state.ready)return;state.pauseOffset=0;if(state.playing)startPlayback(0);else updateUI(0);});
document.getElementById('btnStop').addEventListener('click',()=>{if(!state.ready)return;stopPlayback();state.pauseOffset=0;updateUI(0);});
function seekTo(t){t=Math.max(0,Math.min(state.duration,t));state.pauseOffset=t;if(state.playing)startPlayback(t);else updateUI(t);}
document.getElementById('timeline').addEventListener('click',e=>{if(!state.ready)return;const r=e.currentTarget.getBoundingClientRect();seekTo((e.clientX-r.left)/r.width*state.duration);});
document.getElementById('timeline').addEventListener('keydown',e=>{
  if(!state.ready)return;
  const step=state.duration*0.05;
  if(e.key==='ArrowRight'){seekTo(currentTime()+step);e.preventDefault();}
  else if(e.key==='ArrowLeft'){seekTo(currentTime()-step);e.preventDefault();}
  else if(e.key==='Home'){seekTo(0);e.preventDefault();}
  else if(e.key==='End'){seekTo(state.duration);e.preventDefault();}
});
document.getElementById('center').addEventListener('click',()=>{if(state.ready)document.getElementById('btnPlay').click();else document.getElementById('fileInput').click();});

// overlay
function showOverlay(t,m,p){const o=document.getElementById('overlay');o.classList.add('active');document.getElementById('ovTitle').textContent=t;document.getElementById('ovMsg').textContent=m;document.getElementById('progFill').style.width=p+'%';}
function hideOverlay(){document.getElementById('overlay').classList.remove('active');}
function prog(p,m){document.getElementById('progFill').style.width=p+'%';if(m)document.getElementById('ovMsg').textContent=m;}

async function useSampleTrack(track, button){
  const label = button?.textContent || track.name;
  if (button) {
    button.disabled = true;
    button.textContent = `${track.name} (loading)`;
  }

  const trackUrl = new URL(track.url, location.href);
  if (location.protocol === 'http:' || location.protocol === 'https:') {
    if (trackUrl.origin !== location.origin) {
      hideOverlay();
      if (button) button.textContent = `${track.name} (blocked)`;
      alert(`Sample blocked by CORS policy. Please use a same-origin sample URL: ${track.url}`);
      button.disabled = false;
      if (button?.textContent.includes('(blocked)')) button.textContent = label;
      return;
    }
  }

  try{
    showOverlay('Loading Sample',`Downloading ${track.name}…`,10);
    const resp=await fetch(trackUrl.href);
    const ctype = resp.headers.get('content-type') || '';
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    if (ctype && !ctype.startsWith('audio/') && !ctype.includes('octet-stream')) {
      throw new Error(`Track is not an audio file (${ctype || 'unknown type'})`);
    }
    const blob=await resp.blob();
    if (!blob || !blob.size) {
      throw new Error('Sample file is empty.');
    }
    const file=new File([blob], track.name.replace(/[^\w.-]+/g,'_')+'.mp3', { type: blob.type || 'audio/mpeg' });
    await handleFile(file);
  }catch(e){
    hideOverlay();
    if (button) button.textContent = `${track.name} (failed)`;
    alert('Unable to load sample track: '+e.message);
  } finally {
    if (button) {
      if (!button.textContent.includes('(failed)')) {
        button.textContent = label;
      }
      button.disabled = false;
    }
  }
}

function buildSampleButtons(){
  const container = document.getElementById('sampleRows');
  if(!container)return;
  container.innerHTML='';
  SAMPLE_TRACKS.forEach(track=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.textContent=track.name;
    btn.addEventListener('click',()=>useSampleTrack(track, btn));
    container.appendChild(btn);
  });
}

// file handling
async function handleFile(file){
  const isAudioType = file && file.type ? file.type.startsWith('audio/') : false;
  const isAudioName = !!file && /\.(mp3|wav|m4a|aac|ogg|flac|opus|aiff)$/i.test(file.name||'');
  if(!file||!(isAudioType || isAudioName)){
    alert('Please drop an audio file (mp3, wav, flac, etc.).');
    return;
  }
  stopPlayback();state.ready=false;state.pauseOffset=0;
  document.getElementById('filename').textContent=file.name;
  STEMS.forEach(s=>{
    state.loopDot[s]=-1;
  state.loopStart[s]=0;
  state.loopEnd[s]=0;
  state.loopBase=0;
  document.querySelectorAll(`.loop-row[data-stem="${s}"] .loop-btn`).forEach(btn=>btn.classList.remove('on'));
    document.getElementById('varc-'+s).classList.remove('looping');
  });
  try{
    if(!vSess||!aSess){
      showOverlay('Loading Model','Downloading Spleeter (~80 MB). Cached after first use.',0);
      try{await loadModels((p,m)=>prog(p,m));}
      catch(e){console.warn('Model load failed, DSP fallback:',e);vSess=null;aSess=null;}
    }
    showOverlay('Separating Stems','Processing…',0);
    const dur=await separateAudio(await file.arrayBuffer(),(p,m)=>prog(p,m));
    state.duration=dur;state.ready=true;hideOverlay();
    document.getElementById('playbar').classList.add('active');
    document.getElementById('stems-panel').classList.add('active');
    document.getElementById('waveRow').classList.add('active');
    setGlyph('play');document.getElementById('centerHint').textContent='play';
    document.getElementById('hint').textContent='Tap a quarter to mute · drag in a diagonal direction to set its level';
    updateUI(0);
  }catch(e){console.error(e);hideOverlay();alert('Error processing file: '+e.message);}
}
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

// drag & drop
const center=document.getElementById('center'), device=document.getElementById('device');
['dragenter','dragover'].forEach(ev=>document.body.addEventListener(ev,e=>{e.preventDefault();center.classList.add('drag-over');device.classList.add('drag-active');}));
['dragleave','drop'].forEach(ev=>document.body.addEventListener(ev,e=>{e.preventDefault();center.classList.remove('drag-over');device.classList.remove('drag-active');if(ev==='drop'&&e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);}));

// init
buildDevice();  // arcs are viewBox SVG; build once, they scale automatically
buildSampleButtons();
let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{if(state.ready)STEMS.forEach(s=>drawWave(s));},150);});
</script>
