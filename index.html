<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stem Player</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
<style>
:root {
  --page:       oklch(92% 0.012 84);
  --page-2:     oklch(89% 0.014 82);
  --device-out: oklch(84% 0.018 78);
  --device-in:  oklch(88% 0.013 80);
  --center:     oklch(81% 0.020 74);
  --ink:        oklch(24% 0.012 64);
  --ink-soft:   oklch(42% 0.011 68);
  --ink-faint:  oklch(54% 0.010 70);   /* darkened for WCAG text contrast */
  --ink-ghost:  oklch(70% 0.009 74);   /* decorative only, never text */
  --track:      oklch(78% 0.012 76);
  --amber:      oklch(64% 0.13 64);
  --amber-glow: oklch(64% 0.13 64 / 0.4);
  --wave-bg:    oklch(85% 0.013 78);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background:
    radial-gradient(120% 90% at 50% 0%, var(--page) 0%, var(--page-2) 100%);
  color: var(--ink);
  font-family: 'Helvetica Neue', 'Inter', Arial, sans-serif;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  justify-content: safe center;   /* don't clip top when content overflows short screens */
  padding: 32px 20px 40px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.topbar {
  width: min(480px, 88vw);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
  gap: 16px;
  flex-wrap: wrap;
}
.wordmark {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 0;
}
.wordmark span {
  font-size: 10px;
  letter-spacing: 0.55em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-indent: 0.55em;
}
.wordmark .rule {
  width: 26px;
  height: 1px;
  background: var(--ink-faint);
}

.model-settings {
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.model-select {
  appearance: none;
  background: var(--page);
  color: var(--ink);
  border: 1px solid var(--track);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: inherit;
  min-height: 40px;
}


/* ── device ── */
.device-wrap {
  position: relative;
  width:  min(480px, 88vw);
  height: min(480px, 88vw);
  margin-bottom: 30px;
}

.device {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(80% 80% at 38% 32%, var(--device-in) 0%, var(--device-out) 78%);
  box-shadow:
    inset 0 3px 6px oklch(98% 0 0 / 0.5),
    inset 0 -4px 9px oklch(20% 0.01 60 / 0.10),
    0 16px 50px oklch(24% 0.012 70 / 0.18),
    0 4px 12px oklch(24% 0.012 70 / 0.10);
  transition: box-shadow 0.3s cubic-bezier(0.22,1,0.36,1);
}
.device.drag-active {
  box-shadow:
    inset 0 3px 6px oklch(98% 0 0 / 0.55),
    inset 0 -4px 9px oklch(20% 0.01 60 / 0.12),
    0 22px 64px oklch(24% 0.012 70 / 0.24),
    0 6px 16px oklch(24% 0.012 70 / 0.14);
}

/* SVG overlay for rings + arcs */
.svg-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}
.ring-track { fill: none; stroke: var(--track); stroke-width: 2; }
.ring-fill  { fill: none; stroke: var(--ink); stroke-width: 2; stroke-linecap: round;
              transition: stroke-dashoffset 0.12s linear; }
.vol-track  { fill: none; stroke: var(--track); stroke-width: 4; stroke-linecap: round; }
.vol-fill   { fill: none; stroke: var(--ink); stroke-width: 4; stroke-linecap: round;
              transition: stroke-dasharray 0.07s ease-out; }
.vol-fill.muted { stroke: var(--ink-ghost); }
.vol-fill.looping { stroke: var(--amber); }
.divider    { stroke: var(--track); stroke-width: 1; }

/* ── quadrant hit areas ── */
.quadrant {
  position: absolute;
  width: 50%;
  height: 50%;
  cursor: grab;
  z-index: 5;
  background: none;
  border: none;
  padding: 0;
  touch-action: none;            /* quadrant drag = volume, not page scroll */
  -webkit-user-select: none;
  border-radius: 0;
  transition: background 0.18s;
}
.quadrant:active { cursor: grabbing; }
.device:hover .quadrant:hover { background: oklch(100% 0 0 / 0.05); }
.q-drums  { top: 0; left: 0;  border-top-left-radius: 100%; }
.q-vocals { top: 0; right: 0; border-top-right-radius: 100%; }
.q-bass   { bottom: 0; left: 0;  border-bottom-left-radius: 100%; }
.q-melody { bottom: 0; right: 0; border-bottom-right-radius: 100%; }
.quadrant:focus-visible {
  outline: none;
  background: oklch(100% 0 0 / 0.08);
  box-shadow: inset 0 0 0 2px var(--amber);
}

/* ── labels ── */
.q-label {
  position: absolute;
  font-size: 9.5px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink-soft);
  z-index: 6;
  pointer-events: none;
  text-indent: 0.26em;
  transition: color 0.2s, opacity 0.2s;
}
.q-label { text-align: center; transform: translate(-50%,-50%); }
#lbl-drums  { left: 20%; top: 21%; }
#lbl-vocals { left: 80%; top: 21%; }
#lbl-bass   { left: 20%; top: 79%; }
#lbl-melody { left: 80%; top: 79%; }
.q-label.muted { color: var(--ink-faint); opacity: 0.55; }
.q-label .pct {
  display: block;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-top: 3px;
  text-indent: 0.1em;
}

/* muted quadrant gets a faint diagonal wash */
.quadrant.muted { background: oklch(20% 0.01 60 / 0.05); }

/* small mute glyph shown over a muted quadrant */
.q-mute-mark {
  position: absolute;
  font-size: 11px;
  color: var(--ink-soft);
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.q-mute-mark.on { opacity: 0.8; }
.q-mute-mark { transform: translate(-50%,-50%); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; }
#mm-drums  { left: 20%; top: 31%; }
#mm-vocals { left: 80%; top: 31%; }
#mm-bass   { left: 20%; top: 69%; }
#mm-melody { left: 80%; top: 69%; }

.quadrant.solo {
  background: oklch(64% 0.13 64 / 0.10);
}

.q-solo-mark {
  position: absolute;
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--amber);
  z-index: 7;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%,-50%);
  transition: opacity 0.2s;
}
.q-solo-mark.on { opacity: 0.9; }
#solo-drums  { left: 31%; top: 20%; }
#solo-vocals { left: 69%; top: 20%; }
#solo-bass   { left: 31%; top: 80%; }
#solo-melody { left: 69%; top: 80%; }

.circle-loop-row {
  position: absolute;
  z-index: 9;
  display: none;
  grid-template-columns: repeat(2, 28px);
  gap: 5px;
  pointer-events: auto;
}
.device-wrap.ready .circle-loop-row { display: grid; }
.circle-loop-row .loop-btn {
  min-width: 28px;
  min-height: 28px;
  padding: 0;
  font-size: 8px;
  background: oklch(92% 0.012 84 / 0.76);
}
#circle-loops-drums  { left: 27%; top: 42%; transform: translate(-50%,-50%); }
#circle-loops-vocals { left: 73%; top: 42%; transform: translate(-50%,-50%); }
#circle-loops-bass   { left: 27%; top: 58%; transform: translate(-50%,-50%); }
#circle-loops-melody { left: 73%; top: 58%; transform: translate(-50%,-50%); }

/* discoverability hint under the circle */
.hint {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-align: center;
  margin-bottom: 22px;
  text-indent: 0.14em;
}
@media (max-width: 540px) { .hint { font-size: 10px; } }

/* ── center ── */
.center {
  border: none;
  padding: 0;
  font-family: inherit;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 29%;
  height: 29%;
  border-radius: 50%;
  background: radial-gradient(75% 75% at 40% 35%, oklch(83% 0.018 76), var(--center));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  cursor: pointer;
  z-index: 10;
  box-shadow:
    inset 0 2px 5px oklch(98% 0 0 / 0.34),
    inset 0 -3px 6px oklch(20% 0.01 60 / 0.08),
    0 3px 12px oklch(24% 0.012 70 / 0.14);
  transition: box-shadow 0.2s, transform 0.12s cubic-bezier(0.22,1,0.36,1);
}
.center:hover {
  box-shadow:
    inset 0 2px 5px oklch(98% 0 0 / 0.4),
    inset 0 -3px 6px oklch(20% 0.01 60 / 0.09),
    0 6px 20px oklch(24% 0.012 70 / 0.2);
}
.center:active { transform: translate(-50%, -50%) scale(0.96); }
.center.drag-over {
  box-shadow:
    inset 0 0 0 2px var(--amber),
    inset 0 2px 5px oklch(98% 0 0 / 0.4),
    0 6px 24px oklch(24% 0.012 70 / 0.26);
}
.center-glyph {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.center-glyph svg { width: 100%; height: 100%; fill: var(--ink-soft); }
.center-hint {
  font-size: 7.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-indent: 0.22em;
  pointer-events: none;
}
@keyframes breathe {
  0%,100% { transform: translate(-50%,-50%) scale(1); }
  50%     { transform: translate(-50%,-50%) scale(1.018); }
}
.center.playing { animation: breathe 3.4s ease-in-out infinite; }

/* ── overlay ── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: oklch(92% 0.012 84 / 0.93);
  backdrop-filter: blur(5px);
  z-index: 100;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 18px;
}
#overlay.active { display: flex; }
.ov-title { font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--ink-soft); text-indent: 0.42em; }
.ov-msg   { font-size: 9px; letter-spacing: 0.06em; color: var(--ink-faint); max-width: 250px; text-align: center; line-height: 1.9; }
.prog-wrap { width: 210px; height: 2px; background: var(--track); position: relative; border-radius: 2px; overflow: hidden; }
.prog-fill { position: absolute; inset: 0; background: var(--ink); width: 0%; transition: width 0.3s ease; }

/* ── waveforms ── */
.wave-row { width: min(480px, 88vw); display: none; gap: 4px; margin-bottom: 16px; }
.wave-row.active { display: flex; }
.wave-cell { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.wave-cap { font-size: 7.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); text-align: center; text-indent: 0.2em; }
canvas.wave { width: 100%; height: 26px; background: var(--wave-bg); border-radius: 2px; }

/* ── playbar ── */
#playbar { width: min(480px, 88vw); display: none; flex-direction: column; gap: 11px; margin-bottom: 18px; }
#playbar.active { display: flex; }
.filename { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-indent: 0.2em; }
.timeline-wrap { min-height: 44px; cursor: pointer; position: relative; border-radius: 2px; display: flex; align-items: center; }
.timeline-wrap::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: var(--track); border-radius: 2px; transform: translateY(-50%); }
.timeline-fill { position: absolute; left: 0; right: auto; top: 50%; bottom: auto; height: 2px; background: var(--ink); width: 0%; pointer-events: none; border-radius: 2px; transform: translateY(-50%); }
.timeline-head { position: absolute; top: 50%; left: 0%; width: 13px; height: 13px; border-radius: 50%; background: var(--ink); transform: translate(-50%,-50%); pointer-events: none; transition: left 0.1s linear; box-shadow: 0 1px 3px oklch(24% 0.01 70 / 0.3); }
.time-row { display: flex; justify-content: space-between; font-size: 8px; letter-spacing: 0.12em; color: var(--ink-faint); }
.transport { display: flex; justify-content: center; align-items: center; gap: 10px; }
.tbtn {
  background: none; border: 1px solid var(--track); border-radius: 999px;
  font-family: inherit; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-soft); cursor: pointer;
  min-height: 40px; padding: 0 18px;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  text-indent: 0.18em;
}
.tbtn:hover { color: var(--ink); border-color: var(--ink-faint); }
.tbtn.primary { color: var(--page); background: var(--ink); border-color: var(--ink); font-size: 11px; letter-spacing: 0.22em; min-width: 96px; }
.tbtn.primary:hover { color: var(--page); background: var(--ink-soft); border-color: var(--ink-soft); }

/* ── stem panel ── */
#stems-panel { width: min(480px, 88vw); display: none; flex-direction: column; gap: 2px; }
#stems-panel.active { display: flex; }
.stem-row {
  display: grid;
  grid-template-columns: 52px 1fr auto auto auto;
  align-items: center; gap: 14px;
  padding: 10px 0; border-top: 1px solid var(--track);
}
.stem-name { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); text-indent: 0.2em; }

/* native range slider, themed */
input.vol {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 28px; background: transparent; cursor: pointer; margin: 0;
}
input.vol::-webkit-slider-runnable-track { height: 2px; background: var(--track); border-radius: 2px; }
input.vol::-moz-range-track { height: 2px; background: var(--track); border-radius: 2px; }
input.vol::-moz-range-progress { height: 2px; background: var(--ink); border-radius: 2px; }
input.vol::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%; background: var(--ink);
  margin-top: -8px; box-shadow: 0 1px 3px oklch(24% 0.01 70 / 0.35);
  transition: transform 0.12s;
}
input.vol::-moz-range-thumb {
  width: 18px; height: 18px; border: none; border-radius: 50%; background: var(--ink);
  box-shadow: 0 1px 3px oklch(24% 0.01 70 / 0.35);
}
input.vol:active::-webkit-slider-thumb { transform: scale(1.15); }
input.vol:focus-visible::-webkit-slider-thumb { box-shadow: 0 0 0 4px var(--amber-glow); }
input.vol.muted::-webkit-slider-thumb { background: var(--ink-ghost); }
input.vol.muted::-moz-range-thumb { background: var(--ink-ghost); }

/* mute button */
.stem-mute-btn,
.stem-solo-btn {
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-soft); background: none; border: 1px solid var(--track); border-radius: 999px;
  font-family: inherit; cursor: pointer; min-height: 34px; min-width: 56px; padding: 0 10px;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.stem-mute-btn:hover,
.stem-solo-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
.stem-mute-btn[aria-pressed="true"] { color: var(--page); background: var(--ink-soft); border-color: var(--ink-soft); }
.stem-solo-btn[aria-pressed="true"] { color: var(--page); background: var(--amber); border-color: var(--amber); }

/* loop buttons */
.loop-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}
.loop-btn {
  font-family: inherit; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-soft); background: none; border: 1px solid var(--track); border-radius: 999px;
  min-height: 34px; min-width: 34px; padding: 0 8px; cursor: pointer; appearance: none; text-align: center;
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
}
.loop-btn.on { color: var(--amber); border-color: var(--amber); }
.loop-btn:hover { border-color: var(--ink-faint); }

/* global focus ring */
:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* mobile */
@media (max-width: 540px) {
  body { justify-content: flex-start; padding: 20px 14px 32px; }
  .topbar { justify-content: center; }
  .model-settings { width: 100%; justify-content: center; }
  .stem-row { grid-template-columns: 48px 1fr auto auto; grid-template-areas: "name slider solo mute" "loop loop loop loop"; row-gap: 8px; column-gap: 8px; }
  .stem-name { grid-area: name; }
  input.vol { grid-area: slider; }
  .stem-solo-btn { grid-area: solo; min-height: 44px; min-width: 54px; }
  .stem-mute-btn { grid-area: mute; min-height: 44px; min-width: 54px; }
  .loop-row { grid-area: loop; display: flex; align-items: center; gap: 8px; }
  .loop-btn { min-height: 44px; min-width: 44px; }
  .tbtn { min-height: 44px; }
  .circle-loop-row { grid-template-columns: repeat(2, 24px); gap: 4px; }
  .circle-loop-row .loop-btn { min-width: 24px; min-height: 24px; font-size: 7px; }
}

footer { margin-top: 26px; font-size: 8px; letter-spacing: 0.12em; color: var(--ink-faint); text-align: center; line-height: 2.1; }
footer a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
footer a:hover { border-color: var(--ink-faint); }
#benchStats { display: block; margin-top: 8px; color: var(--ink-soft); }

#fileInput { display: none; }

.sample-rows {
  width: min(480px, 88vw);
  margin: 0 auto 10px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
}
.sample-rows button {
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: none;
  color: var(--ink-soft);
  background: none;
  border: 1px solid var(--track);
  border-radius: 999px;
  padding: 8px;
}
.sample-rows button:hover { border-color: var(--ink-faint); }
button:disabled,
select:disabled {
  cursor: not-allowed;
  opacity: 0.48;
}
</style>
</head>
<body>

<input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg,.flac">

<div class="topbar">
  <div class="wordmark"><div class="rule"></div><span>Stem Player</span><div class="rule"></div></div>
  <label class="model-settings" for="modelMode">
    Separator:
    <select class="model-select" id="modelMode">
      <option value="fast">Faster · worse quality</option>
      <option value="better" selected>Better · slower quality</option>
    </select>
  </label>
</div>

<div class="device-wrap" id="deviceWrap">
  <div class="device" id="device"></div>

  <svg class="svg-layer" id="svg" viewBox="0 0 1000 1000" aria-hidden="true">
    <!-- progress ring -->
    <circle class="ring-track" cx="500" cy="500" r="476"></circle>
    <circle class="ring-fill"  cx="500" cy="500" r="476" id="ringFill"
            pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"
            transform="rotate(-90 500 500)"></circle>
    <!-- dividers -->
    <line class="divider" x1="120" y1="500" x2="880" y2="500"></line>
    <line class="divider" x1="500" y1="120" x2="500" y2="880"></line>
    <!-- volume arcs injected by JS -->
    <g id="volArcs"></g>
  </svg>

  <button type="button" class="quadrant q-drums"  data-stem="drums"  aria-label="Drums: click to solo, drag away from center to increase level"></button>
  <button type="button" class="quadrant q-vocals" data-stem="vocals" aria-label="Vocals: click to solo, drag away from center to increase level"></button>
  <button type="button" class="quadrant q-bass"   data-stem="bass"   aria-label="Bass: click to solo, drag away from center to increase level"></button>
  <button type="button" class="quadrant q-melody" data-stem="melody" aria-label="Melody: click to solo, drag away from center to increase level"></button>

  <span class="q-mute-mark" id="mm-drums">muted</span>
  <span class="q-mute-mark" id="mm-vocals">muted</span>
  <span class="q-mute-mark" id="mm-bass">muted</span>
  <span class="q-mute-mark" id="mm-melody">muted</span>

  <span class="q-solo-mark" id="solo-drums">solo</span>
  <span class="q-solo-mark" id="solo-vocals">solo</span>
  <span class="q-solo-mark" id="solo-bass">solo</span>
  <span class="q-solo-mark" id="solo-melody">solo</span>

  <div class="q-label" id="lbl-drums" aria-hidden="true">Drums<span class="pct" id="pct-drums">80</span></div>
  <div class="q-label" id="lbl-vocals" aria-hidden="true">Vocals<span class="pct" id="pct-vocals">80</span></div>
  <div class="q-label" id="lbl-bass" aria-hidden="true">Bass<span class="pct" id="pct-bass">80</span></div>

<script>
'use strict';

// ── constants ──
const FFT_SIZE  = 4096;
const HOP_SIZE  = 1024;
const SR        = 44100;
const TOT_BINS  = FFT_SIZE / 2 + 1;   // 2049
const MODEL_BINS = 1024;              // spleeter uses first 1024 bins
const SEG_FRAMES = 512;               // spleeter time-frames per segment
const LOOP_BARS = [1, 2, 4, 8];
const HF = 'https://huggingface.co/csukuangfj/sherpa-onnx-spleeter-2stems/resolve/main/';
const MODEL_LOAD_TIMEOUT_MS = 18_000;
const MAX_AUDIO_BYTES = 80 * 1024 * 1024;
const MAX_AUDIO_DURATION_SEC = 10 * 60;
const SAMPLE_TRACKS = [
  {name:'Gentleman — cdk feat. QuianaNadine', url:'./samples/stem-sample-1.mp3'},
  {name:'Red Light Blues — Alex & UnrealDM', url:'./samples/stem-sample-2.mp3'},
  {name:'Pyramid — 7OOP3D feat. Mr Yesterday', url:'./samples/stem-sample-3.mp3'},
];
const STEMS = ['drums','vocals','bass','melody'];
const MODEL_PRESETS = {
  fast: {
    id: 'fast',
    label: 'Faster · worse quality',
    needsModel: false,
    modelUrls: null,
    loadLabel: 'Using DSP-only path (no ML models).',
  },
  better: {
    id: 'better',
    label: 'Better · slower quality',
    needsModel: true,
    modelUrls: {
      vocals: 'vocals.onnx',
      accompaniment: 'accompaniment.onnx',
    },
    loadLabel: 'Loading 2-stem ML separator (~78MB).',
  },
};

let selectedModelMode = 'better';
const bench = {
  fast: { loadMs: 0, separateMs: 0 },
  better: { loadMs: 0, separateMs: 0 },
};

// quadrant angular ranges (screen deg, 0=east, 90=south, clockwise)
const Q_RANGE = {
  drums:  [180, 270],
  vocals: [270, 360],
  bass:   [ 90, 180],
  melody: [  0,  90],
};
const VOLUME_DRAG_VECTOR = {
  drums:  {x:-1, y:-1},
  vocals: {x: 1, y:-1},
  bass:   {x:-1, y: 1},
  melody: {x: 1, y: 1},
};

// ── state ──
const state = {
  ready:false, playing:false,
  processing:false, jobId:0,
  muted:  {drums:false,vocals:false,bass:false,melody:false},
  volume: {drums:0.8,vocals:0.8,bass:0.8,melody:0.8},
  soloStem:null,
  loopDot:{drums:-1,vocals:-1,bass:-1,melody:-1},
  loopStart:{drums:0,vocals:0,bass:0,melody:0},
  loopEnd:{drums:0,vocals:0,bass:0,melody:0},
  loopBase:0,
  modelMode:'better',
  pauseOffset:0, startTime:0, duration:0, bpm:120, raf:null,
};
let audioCtx;
const gains={}, sources={}, buffers={};

// ── geometry helpers ──
function polar(angDeg, r){
  const a = angDeg * Math.PI/180;
  return [500 + Math.cos(a)*r, 500 + Math.sin(a)*r];
}
function arcPath(angle0, angle1, r){
  const [sx,sy] = polar(angle0, r);
  const [ex,ey] = polar(angle1, r);
  const large = (angle1-angle0) > 180 ? 1 : 0;
  return `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;
}

// build volume arcs + place labels & dots
function buildDevice(){
  const NS='http://www.w3.org/2000/svg';
  const g = document.getElementById('volArcs');
  g.innerHTML='';
  const VOL_R = 318, PAD = 7;

  STEMS.forEach(stem=>{
    const [a0,a1] = Q_RANGE[stem];
    const s = a0+PAD, e = a1-PAD;
    const track = document.createElementNS(NS,'path');
    track.setAttribute('class','vol-track');
    track.setAttribute('d', arcPath(s, e, VOL_R));
    g.appendChild(track);

    const fill = document.createElementNS(NS,'path');
    fill.setAttribute('class','vol-fill');
    fill.setAttribute('id','varc-'+stem);
    fill.setAttribute('d', arcPath(s, e, VOL_R));
    fill.setAttribute('pathLength','1');
    g.appendChild(fill);
    setVolArc(stem, state.volume[stem]);
  });
  // labels & mute-marks are positioned via CSS percentages (no flash, scales free)
}

function setVolArc(stem, v){
  const el = document.getElementById('varc-'+stem);
  if(el) el.setAttribute('stroke-dasharray', `${v.toFixed(4)} 1`);
}

function measureLength(){
  return (60/state.bpm) * 4;
}

function snapLoopStart(currentSec){
  const len = measureLength();
  if(!len || !Number.isFinite(currentSec) || !state.duration) return 0;
  const boundary = Math.floor(currentSec / len) * len;
  const nextBoundary = boundary + len;
  const epsilon = 0.03;

  if (Math.abs(currentSec - boundary) < epsilon) {
    return boundary;
  }
  return nextBoundary;
}

function setLoop(stem, idx){
  state.loopDot[stem]=idx;
  const buttons = document.querySelectorAll(`.loop-btn[data-stem="${stem}"]`);
  buttons.forEach((button)=>{
    const isOn = Number(button.dataset.loop)===idx;
    button.classList.toggle('on', isOn);
    button.setAttribute('aria-pressed', String(isOn));
  });

  if(idx < 0){
    document.getElementById(`varc-${stem}`).classList.remove('looping');
    if(state.playing)applyLoopToStem(stem);
    return;
  }

  const len = measureLength();
  const start = snapLoopStart(currentTime()%state.duration);
  const end = start + LOOP_BARS[idx] * len;
  state.loopBase = start;

  if(end > state.duration){
    alert(`Loop too long for current selection. Try a smaller length or stay away from end of track.`);
    state.loopDot[stem] = -1;
    buttons.forEach((button)=>{
      button.classList.toggle('on', false);
      button.setAttribute('aria-pressed', 'false');
    });
    document.getElementById(`varc-${stem}`).classList.remove('looping');
    if(state.playing)applyLoopToStem(stem);
    return;
  }

  state.loopStart[stem] = start;
  state.loopEnd[stem] = end;
  document.getElementById(`varc-${stem}`).classList.add('looping');
  if(state.playing){applyLoopToStem(stem);}
}

// ── FFT ──
function hann(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=0.5-0.5*Math.cos(2*Math.PI*i/N);return w;}
function fftIP(re,im){
  const N=re.length;
  for(let i=1,j=0;i<N;i++){let bit=N>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){[re[i],re[j]]=[re[j],re[i]];[im[i],im[j]]=[im[j],im[i]];}}
  for(let len=2;len<=N;len<<=1){const a=-2*Math.PI/len,wr0=Math.cos(a),wi0=Math.sin(a);
    for(let i=0;i<N;i+=len){let wr=1,wi=0;for(let j=0;j<len>>1;j++){const u=i+j,v=u+(len>>1);
      const tRe=wr*re[v]-wi*im[v],tIm=wr*im[v]+wi*re[v];
      re[v]=re[u]-tRe;im[v]=im[u]-tIm;re[u]+=tRe;im[u]+=tIm;
      const nr=wr*wr0-wi*wi0;wi=wr*wi0+wi*wr0;wr=nr;}}}
}
function ifftIP(re,im){for(let i=0;i<im.length;i++)im[i]=-im[i];fftIP(re,im);const N=re.length;for(let i=0;i<N;i++){re[i]/=N;im[i]=-im[i]/N;}}
async function stft(sig,win){
  const F=Math.floor((sig.length-FFT_SIZE)/HOP_SIZE)+1;
  if (F < 1) throw new Error('Audio is too short to separate. Try a file longer than 0.1 seconds.');
  const re=[],im=[],fr=new Float32Array(FFT_SIZE),fi=new Float32Array(FFT_SIZE);
  for(let f=0;f<F;f++){const s=f*HOP_SIZE;
    for(let i=0;i<FFT_SIZE;i++){fr[i]=(s+i<sig.length?sig[s+i]:0)*win[i];fi[i]=0;}
    fftIP(fr,fi);
    re.push(new Float32Array(fr.subarray(0,TOT_BINS)));
    im.push(new Float32Array(fi.subarray(0,TOT_BINS)));
    if ((f & 7) === 0) await yieldToUiTick();
  }
  return {re,im,F};
}
async function istft(re,im,F,win){
  const len=(F-1)*HOP_SIZE+FFT_SIZE,out=new Float32Array(len),nrm=new Float32Array(len);
  const fr=new Float32Array(FFT_SIZE),fi=new Float32Array(FFT_SIZE);
  for(let f=0;f<F;f++){
    for(let b=0;b<TOT_BINS;b++){fr[b]=re[f][b];fi[b]=im[f][b];}
    for(let b=1;b<TOT_BINS-1;b++){fr[FFT_SIZE-b]=fr[b];fi[FFT_SIZE-b]=-fi[b];}
    ifftIP(fr,fi);
    const s=f*HOP_SIZE;
    for(let i=0;i<FFT_SIZE;i++){out[s+i]+=fr[i]*win[i];nrm[s+i]+=win[i]*win[i];}
    if ((f & 15) === 0) await yieldToUiTick();
  }
  for(let i=0;i<len;i++)if(nrm[i]>1e-8)out[i]/=nrm[i];
  return out;
}

// ── HPSS ──
async function medFilter(spec,F,B,L,axis){
  const out=new Float32Array(F*B),col=new Float32Array(L),h=L>>1;
  if(axis==='h'){
    for(let b=0;b<B;b++){
      for(let f=0;f<F;f++){
        for(let k=0;k<L;k++){const fi=f-h+k;col[k]=(fi>=0&&fi<F)?spec[fi*B+b]:0;}
        col.sort();
        out[f*B+b]=col[h];
      }
      if ((b & 15) === 0) await yieldToUiTick();
    }
  } else {
    for(let f=0;f<F;f++){
      for(let b=0;b<B;b++){
        for(let k=0;k<L;k++){const bi=b-h+k;col[k]=(bi>=0&&bi<B)?spec[f*B+bi]:0;}
        col.sort();
        out[f*B+b]=col[h];
      }
      if ((f & 15) === 0) await yieldToUiTick();
    }
  }
  return out;
}
async function hpss(re,im,F,B){
  const mag=new Float32Array(F*B);
  for(let f=0;f<F;f++){
    for(let b=0;b<B;b++)mag[f*B+b]=re[f][b]**2+im[f][b]**2;
    if ((f & 31) === 0) await yieldToUiTick();
  }
  const H=await medFilter(mag,F,B,17,'h'),P=await medFilter(mag,F,B,17,'v');
  const hRe=re.map(()=>new Float32Array(B)),hIm=im.map(()=>new Float32Array(B));
  const pRe=re.map(()=>new Float32Array(B)),pIm=im.map(()=>new Float32Array(B));
  for(let f=0;f<F;f++){
    for(let b=0;b<B;b++){
      const hh=H[f*B+b],pp=P[f*B+b],d=hh+pp+1e-8;
      hRe[f][b]=re[f][b]*hh/d;
      hIm[f][b]=im[f][b]*hh/d;
      pRe[f][b]=re[f][b]*pp/d;
      pIm[f][b]=im[f][b]*pp/d;
    }
    if ((f & 31) === 0) await yieldToUiTick();
  }
  return {hRe,hIm,pRe,pIm};
}
async function lowPass(re,im,F,B,hz){
  const cut=Math.round(hz/(SR/FFT_SIZE));
  const lRe=re.map(r=>new Float32Array(r)),lIm=im.map(r=>new Float32Array(r));
  const hRe=re.map(r=>new Float32Array(r)),hIm=im.map(r=>new Float32Array(r));
  for(let f=0;f<F;f++){
    for(let b=cut;b<B;b++){lRe[f][b]=0;lIm[f][b]=0;}
    for(let b=0;b<cut;b++){hRe[f][b]=0;hIm[f][b]=0;}
    if ((f & 31) === 0) await yieldToUiTick();
  }
  return {lRe,lIm,hRe,hIm};
}

// ── model architecture ──
let betterVocalsSession = null;
let betterAccompanimentSession = null;
const modelLoadPromises = {};

function getModelModeFromUi(){
  const selected = document.getElementById('modelMode')?.value || selectedModelMode;
  return selected === 'fast' ? 'fast' : 'better';
}
function setModelMode(mode){
  selectedModelMode = mode === 'fast' ? 'fast' : 'better';
  state.modelMode = selectedModelMode;
  const el = document.getElementById('modelMode');
  if (el) el.value = selectedModelMode;
}

function getErrorMessage(err){
  if (err == null) return 'Unknown error';
  if (typeof err === 'string') return err;
  if (typeof err === 'number') return `Error code ${err}`;
  if (err instanceof Error) return err.message || String(err);
  if (err.message) return err.message;
  try { return JSON.stringify(err); } catch (_) { return String(err); }
}

function msToString(v){
  if (!Number.isFinite(v) || v <= 0) return 'n/a';
  if (v < 1000) return `${v.toFixed(0)} ms`;
  return `${(v / 1000).toFixed(2)} s`;
}

function clampPercent(v, lo=0, hi=100){
  return Math.max(lo, Math.min(hi, v));
}

function yieldToUiTick(){
  return new Promise((resolve) => setTimeout(resolve, 0));
}

function startProgressPulse(onProg, from, to, message){
  if (!onProg) return () => {};
  const started = performance.now();
  const span = Math.max(0, to - from);
  const duration = 8_000;
  let running = true;
  let timerId = 0;

  const tick = () => {
    if (!running) return;
    const ratio = Math.min(1, (performance.now() - started) / duration);
    const p = clampPercent(from + span * ratio, from, to);
    onProg(p, message);
    timerId = window.setTimeout(tick, 110);
  };

  tick();
  return () => {
    running = false;
    if (timerId) clearTimeout(timerId);
  };
}

function setBenchline(){
  const bits = [
    `Fast model: load ${msToString(bench.fast.loadMs)} · separate ${msToString(bench.fast.separateMs)}`,
    `Better model: load ${msToString(bench.better.loadMs)} · separate ${msToString(bench.better.separateMs)}`,
  ];

  }
}

function isBetterModelReady(){
  return !!(betterVocalsSession && betterAccompanimentSession);
}

async function dl(url, onProg, s0, s1){
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), MODEL_LOAD_TIMEOUT_MS);
  try {
    const r = await fetch(url, { signal: controller.signal });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const total = +r.headers.get('content-length') || 0;
    const body = r.body;
    if (!body || typeof body.getReader !== 'function') {
      const blob = await r.arrayBuffer();
      return blob;
    }
    const rd = body.getReader();
    const ch = [];
    let ld = 0;
    while(true){
      const { done, value } = await rd.read();
      if (done) break;
      ch.push(value);
      ld += value.length;
      if (onProg && total) onProg(s0 + (s1 - s0) * (ld / total), 'Downloading model…');
    }
    const b = new Uint8Array(ld);
    let o = 0;
    for (const c of ch){ b.set(c, o); o += c.length; }
    return b.buffer;
  } finally {
    clearTimeout(timeout);
  }
}

async function loadBetterModel(onProg){
  if (isBetterModelReady()) return;
  if (modelLoadPromises.better) return modelLoadPromises.better;

  const preset = MODEL_PRESETS.better;
  modelLoadPromises.better = (async () => {
    const loadStart = performance.now();
    ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/';
    if (onProg) onProg(0, 'Downloading vocals model (39 MB)...');
    try {
      betterVocalsSession = await ort.InferenceSession.create(
        await dl(HF + preset.modelUrls.vocals, onProg, 0, 46),
        { executionProviders:['wasm'] }
      );
      if (onProg) onProg(50, 'Downloading accompaniment model (39 MB)...');
      betterAccompanimentSession = await ort.InferenceSession.create(
        await dl(HF + preset.modelUrls.accompaniment, onProg, 50, 100),
        { executionProviders:['wasm'] }
      );
      if (onProg) onProg(100, 'Models ready');
      bench.better.loadMs = performance.now() - loadStart;
      setBenchline();
    } catch (err){
      if (err?.name === 'AbortError') {
        throw new Error(`Model download timed out after ${Math.round(MODEL_LOAD_TIMEOUT_MS / 1000)}s`);
      }
      betterVocalsSession = null;
      betterAccompanimentSession = null;
      bench.better.loadMs = 0;
      setBenchline();
      throw err;
    } finally {
      delete modelLoadPromises.better;
    }
  })();

  return modelLoadPromises.better;
}

function ensureModelReady(mode, onProg){
  if (mode === 'fast') return Promise.resolve();
  return loadBetterModel(onProg);
}

async function smoothMask(src, frames, bins){
  const out = new Float32Array(src.length);
  const radiusT = 1;
  const radiusB = 1;
  for (let f=0; f<frames; f++){
    const row = f * bins;
    const f0 = Math.max(0, f - radiusT);
    const f1 = Math.min(frames - 1, f + radiusT);
    for (let b=0; b<bins; b++){
      const b0 = Math.max(0, b - radiusB);
      const b1 = Math.min(bins - 1, b + radiusB);
      let s = 0;
      let c = 0;
      for (let fi = f0; fi <= f1; fi++){
        const base = fi * bins;
        for (let bi = b0; bi <= b1; bi++){
          s += src[base + bi];
          c++;
        }
      }
      out[row + b] = s / c;
    }
    if ((f & 15) === 0) await yieldToUiTick();
  }
  return out;
}

// ── pipeline ──
async function separateAudio(arrayBuf,onProg,mode='better'){
  onProg(0,'Decoding audio…');
  audioCtx=audioCtx||new AudioContext({sampleRate:SR});
  if(audioCtx.state==='suspended')await audioCtx.resume();
  const stopDecodePulse = startProgressPulse(onProg, 0, 4, 'Decoding audio…');
  let raw;
  try {
    raw=await audioCtx.decodeAudioData(arrayBuf.slice(0));
  } finally {
    stopDecodePulse();
  }
  if (!Number.isFinite(raw.duration) || raw.duration <= 0) {
    throw new Error('Unable to read audio duration. Please try another audio file.');
  }
  if (raw.duration > MAX_AUDIO_DURATION_SEC) {
    throw new Error(`Audio is too long for in-browser separation. Please use a track under ${Math.round(MAX_AUDIO_DURATION_SEC / 60)} minutes.`);
  }
  const nCh=raw.numberOfChannels;
  const sigL=raw.getChannelData(0), sigR=nCh>1?raw.getChannelData(1):sigL;

  onProg(5,'Computing spectrograms…');
  const win=hann(FFT_SIZE);
  const stL=await stft(sigL,win), stR=await stft(sigR,win);
  const F=stL.F;

  // magnitudes (low MODEL_BINS only needed for model)
  const magL=new Array(F);
  const magR=new Array(F);
  for(let f=0; f<F; f++){
    const l = new Float32Array(MODEL_BINS);
    const r = new Float32Array(MODEL_BINS);
    const leftRe = stL.re[f];
    const leftIm = stL.im[f];
    const rightRe = stR.re[f];
    const rightIm = stR.im[f];
    for(let b=0;b<MODEL_BINS;b++){
      l[b]=Math.hypot(leftRe[b], leftIm[b]);
      r[b]=Math.hypot(rightRe[b], rightIm[b]);
    }
    magL[f]=l;
    magR[f]=r;
    if ((f & 31) === 0) await yieldToUiTick();
  }

  const useModel = MODEL_PRESETS[mode]?.needsModel === true;
  const useBetterModel = useModel && isBetterModelReady();
  let vMask = new Float32Array(F*MODEL_BINS);  // vocal soft mask per (frame,bin)
  if(mode === 'fast') {
    onProg(12, 'Preparing fast mode…');
  }

  if(useBetterModel){
    const nSeg=Math.ceil(F/SEG_FRAMES);
    const segData=new Float32Array(2*SEG_FRAMES*MODEL_BINS);
    for(let seg=0;seg<nSeg;seg++){
      segData.fill(0);
      for(let fr=0;fr<SEG_FRAMES;fr++){
        const f=seg*SEG_FRAMES+fr; if(f>=F)break;
        const baseL=(0*SEG_FRAMES+fr)*MODEL_BINS, baseR=(1*SEG_FRAMES+fr)*MODEL_BINS;
        for(let b=0;b<MODEL_BINS;b++){segData[baseL+b]=magL[f][b];segData[baseR+b]=magR[f][b];}
      }
      const ve=(await betterVocalsSession.run({x:new ort.Tensor('float32',segData,[2,1,SEG_FRAMES,MODEL_BINS])})).y.data;
      const ae=(await betterAccompanimentSession.run({x:new ort.Tensor('float32',segData.slice(),[2,1,SEG_FRAMES,MODEL_BINS])})).y.data;
      for(let fr=0;fr<SEG_FRAMES;fr++){
        const f=seg*SEG_FRAMES+fr; if(f>=F)break;
        const bL=(0*SEG_FRAMES+fr)*MODEL_BINS, bR=(1*SEG_FRAMES+fr)*MODEL_BINS;
        for(let b=0;b<MODEL_BINS;b++){
          const vp=ve[bL+b]**2+ve[bR+b]**2, ap=ae[bL+b]**2+ae[bR+b]**2;
          vMask[f*MODEL_BINS+b]=vp/(vp+ap+1e-10);
        }
      }
      if ((seg & 3) === 0) await yieldToUiTick();
      onProg(12+56*(seg+1)/nSeg,`Separating vocals… ${seg+1}/${nSeg}`);
    }
  } else {
    onProg(40,'DSP separation (model unavailable)…');
    for(let f=0;f<F;f++){
      const row = f*MODEL_BINS;
      for(let b=0;b<MODEL_BINS;b++){
        const l=magL[f][b],r=magR[f][b];
        vMask[row+b]=Math.min(l,r)/(0.5*(l+r)+1e-8);
      }
      if ((f & 31) === 0) await yieldToUiTick();
    }
  }

  if (mode === 'better'){
    onProg(62, 'Refining mask (better mode)…');
    vMask = await smoothMask(vMask, F, MODEL_BINS);
  }

  onProg(70,'Applying masks…');
  const vRe=stL.re.map(()=>new Float32Array(TOT_BINS)), vIm=stL.im.map(()=>new Float32Array(TOT_BINS));
  const aRe=stL.re.map(()=>new Float32Array(TOT_BINS)), aIm=stL.im.map(()=>new Float32Array(TOT_BINS));
  for(let f=0;f<F;f++){
    const leftRe = stL.re[f];
    const rightRe = stR.re[f];
    const leftIm = stL.im[f];
    const rightIm = stR.im[f];
    const vReRow = vRe[f];
    const vImRow = vIm[f];
    const aReRow = aRe[f];
    const aImRow = aIm[f];
    const maskRow = f*MODEL_BINS;
    for(let b=0;b<TOT_BINS;b++){
      const mRe=(leftRe[b]+rightRe[b])*0.5, mIm=(leftIm[b]+rightIm[b])*0.5;
      const vm = b<MODEL_BINS ? vMask[maskRow+b] : 0;  // high bins -> accompaniment
      vReRow[b]=mRe*vm; vImRow[b]=mIm*vm;
      aReRow[b]=mRe*(1-vm); aImRow[b]=mIm*(1-vm);
    }
    if ((f & 31) === 0) await yieldToUiTick();
  }

  onProg(74,'Splitting drums & melody (HPSS)…');
  const {hRe,hIm,pRe,pIm}=await hpss(aRe,aIm,F,TOT_BINS);
  onProg(82,'Extracting bass…');
  const {lRe:bsRe,lIm:bsIm,hRe:mlRe,hIm:mlIm}=await lowPass(hRe,hIm,F,TOT_BINS,300);

  onProg(86,'Synthesizing stems…');
  const dur=raw.duration;
  const toAB=async (re,im)=>{const sig=await istft(re,im,F,win);const ab=audioCtx.createBuffer(1,Math.min(sig.length,Math.ceil(dur*SR)),SR);ab.copyToChannel(sig.subarray(0,ab.length),0);return ab;};
  buffers.drums=await toAB(pRe,pIm); await yieldToUiTick(); onProg(89,'…');
  buffers.vocals=await toAB(vRe,vIm); await yieldToUiTick(); onProg(92,'…');
  buffers.bass=await toAB(bsRe,bsIm); await yieldToUiTick(); onProg(95,'…');
  buffers.melody=await toAB(mlRe,mlIm); await yieldToUiTick();
  onProg(98,'Drawing waveforms…');
  STEMS.forEach(s=>drawWave(s));
  onProg(100,'Done');
  return dur;
}

// ── waveform ──
function drawWave(stem){
  const ids={drums:'wDrums',vocals:'wVocals',bass:'wBass',melody:'wMelody'};
  const c=document.getElementById(ids[stem]); const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  c.width=(c.offsetWidth||100)*dpr; c.height=26*dpr; ctx.scale(dpr,dpr);
  const w=c.offsetWidth||100,h=26;
  ctx.clearRect(0,0,w,h);
  const data=buffers[stem].getChannelData(0);
  const step=Math.ceil(data.length/w);
  const cs=getComputedStyle(document.documentElement);
  ctx.fillStyle=cs.getPropertyValue('--ink').trim()||'#333';
  for(let x=0;x<w;x++){let mx=0;for(let i=0;i<step;i++){const v=Math.abs(data[x*step+i]||0);if(v>mx)mx=v;}const bh=Math.max(0.7,mx*h);ctx.fillRect(x,(h-bh)/2,1,bh);}
}

// ── playback ──
function effectiveStemGain(stem){
  if (state.soloStem && state.soloStem !== stem) return 0;
  return state.muted[stem] ? 0 : state.volume[stem];
}
function applyStemGain(stem){
  if(gains[stem])gains[stem].gain.value=effectiveStemGain(stem);
}
function applyAllStemGains(){
  STEMS.forEach(applyStemGain);
}
function buildGains(){STEMS.forEach(s=>{gains[s]=audioCtx.createGain();gains[s].gain.value=effectiveStemGain(s);gains[s].connect(audioCtx.destination);});}
function hasActiveLoop(){
  return STEMS.some(s=>state.loopDot[s] >= 0);
}
function loopAwareTime(t){
  if(!state.duration || !hasActiveLoop()) return t;
  return Math.min(t, state.duration);
}
function pauseTime(){
  return loopAwareTime(currentTime());
}
function rebuildStemSource(stem, startOffset=0){
  if(!buffers[stem] || !gains[stem]) return;

  const d = state.loopDot[stem];
  const loopStart = state.loopStart[stem];
  const loopEnd = state.loopEnd[stem];

  if (sources[stem]) {
    try { sources[stem].stop(); } catch (_) {}
    try { sources[stem].disconnect(); } catch (_) {}
    sources[stem] = null;
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buffers[stem];
  src.connect(gains[stem]);

  if (d >= 0 && loopEnd > loopStart) {
    src.loop = true;
    src.loopStart = loopStart;
    src.loopEnd = loopEnd;
  } else {
    src.loop = false;
  }

  src.start(0, startOffset);
  sources[stem] = src;
}
function applyLoopToStem(stem){
  if (!state.playing || !sources[stem]) return;

  const d = state.loopDot[stem];
  if (d < 0) {
    sources[stem].loop = false;
    return;
  }

  const loopStart = state.loopStart[stem];
  const loopEnd = state.loopEnd[stem];
  if (!(loopEnd > loopStart)) {
    sources[stem].loop = false;
    return;
  }

  const t = loopAwareTime(currentTime());
  if (t >= loopEnd) {
    rebuildStemSource(stem, loopStart);
    return;
  }

  sources[stem].loop = true;
  sources[stem].loopStart = loopStart;
  sources[stem].loopEnd = loopEnd;
}
function startPlayback(off=0){
  stopPlayback(); buildGains();
  state.startTime=audioCtx.currentTime-off; state.playing=true;
  STEMS.forEach(s=>{const src=audioCtx.createBufferSource();src.buffer=buffers[s];src.connect(gains[s]);
    const d=state.loopDot[s];
    let startOffset=off;
    if(d>=0){
      const loopStart=state.loopStart[s];
      const loopEnd=state.loopEnd[s];
      if(loopEnd > loopStart){
        src.loop=true;
        src.loopStart=loopStart;
        src.loopEnd=loopEnd;
        if(startOffset >= loopEnd){startOffset=loopStart;}
      }
    }else{
      src.loop=false;
    }
    src.start(0,startOffset);
    sources[s]=src;});
  document.getElementById('center').classList.add('playing');
  setGlyph('pause'); document.getElementById('btnPlay').textContent='pause';
  document.getElementById('centerHint').textContent='playing';
  tick();
}
function stopPlayback(){
  if(state.raf){cancelAnimationFrame(state.raf);state.raf=null;}
  state.playing=false;
  STEMS.forEach(s=>{try{sources[s]&&sources[s].stop();}catch(e){}sources[s]=null;});
  STEMS.forEach(s=>{try{gains[s]&&gains[s].disconnect();}catch(e){}});
  document.getElementById('center').classList.remove('playing');
  if(state.ready){setGlyph('play');document.getElementById('btnPlay').textContent='play';document.getElementById('centerHint').textContent='play';}
}
function currentTime(){return state.playing?audioCtx.currentTime-state.startTime:state.pauseOffset;}
function tick(){
  const t = currentTime();
  const vis = loopAwareTime(t);
  if(t>=state.duration&&state.playing&&!hasActiveLoop()){
    stopPlayback();
    state.pauseOffset=0;
    updateUI(0);
    return;
  }
  updateUI(vis);
  state.raf=requestAnimationFrame(tick);
}
function updateUI(t){
  const pct=state.duration ? Math.max(0,Math.min(1,t/state.duration)) : 0;
  document.getElementById('timelineFill').style.width=(pct*100)+'%';
  document.getElementById('timelineHead').style.left=(pct*100)+'%';
  document.getElementById('ringFill').setAttribute('stroke-dashoffset', (1-pct).toFixed(4));
  const tl=document.getElementById('timeline');
  tl.setAttribute('aria-valuenow', Math.round(pct*100));
  tl.setAttribute('aria-valuetext', fmt(t)+' of '+fmt(state.duration));
  document.getElementById('timeCur').textContent=fmt(t);
  document.getElementById('timeTot').textContent=fmt(state.duration);
}
function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return`${m}:${ss.toString().padStart(2,'0')}`;}

// glyph morph
function setGlyph(kind){
  const g=document.getElementById('centerGlyph');
  if(kind==='play')  g.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  else if(kind==='pause') g.innerHTML='<svg viewBox="0 0 24 24"><path d="M7 5h3.5v14H7zM13.5 5H17v14h-3.5z"/></svg>';
  else g.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 20h14" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

// ── volume / mute ──
function setVolume(stem,v,fromSlider){
  v=Math.max(0,Math.min(1,v));
  state.volume[stem]=v;
  applyStemGain(stem);
  setVolArc(stem,v);
  document.getElementById('pct-'+stem).textContent=Math.round(v*100);
  if(!fromSlider){const sl=document.getElementById('vol-'+stem);if(sl)sl.value=Math.round(v*100);}
}
function updateSoloUI(){
  STEMS.forEach(stem=>{
    const on = state.soloStem === stem;
    document.querySelector(`.quadrant[data-stem="${stem}"]`).classList.toggle('solo', on);
    document.getElementById('solo-'+stem).classList.toggle('on', on);

    btn.setAttribute('aria-pressed', String(on));
    btn.textContent = on ? 'soloed' : 'solo';
  });
}
function setSolo(stem){
  state.soloStem = state.soloStem === stem ? null : stem;
  if (state.soloStem) {
    setMute(state.soloStem, false, {preserveSolo:true});
  }
  updateSoloUI();
  applyAllStemGains();
}
function setMute(stem, muted, options={}){
  state.muted[stem]=muted;
  if(muted && state.soloStem === stem && !options.preserveSolo){
    state.soloStem = null;
    updateSoloUI();
  }
  applyStemGain(stem);
  document.getElementById('lbl-'+stem).classList.toggle('muted',muted);
  document.querySelector(`.quadrant[data-stem="${stem}"]`).classList.toggle('muted',muted);
  document.getElementById('mm-'+stem).classList.toggle('on',muted);
  document.getElementById('varc-'+stem).classList.toggle('muted',muted);
  document.getElementById('vol-'+stem).classList.toggle('muted',muted);
  const btn=document.querySelector(`.stem-mute-btn[data-stem="${stem}"]`);
  btn.setAttribute('aria-pressed',String(muted));
  btn.textContent=muted?'muted':'mute';
}
function toggleMute(stem){ if(state.ready) setMute(stem,!state.muted[stem]); }
function toggleSolo(stem){ if(state.ready) setSolo(stem); }

// quadrant: tap = solo, drag outward from center = volume up
STEMS.forEach(stem=>{
  const q=document.querySelector(`.quadrant[data-stem="${stem}"]`);
  let id=null,x0=0,y0=0,v0=0,moved=false;
  q.addEventListener('pointerdown',e=>{
    if(!state.ready)return;
    id=e.pointerId; x0=e.clientX; y0=e.clientY; v0=state.volume[stem]; moved=false;
    q.setPointerCapture(id);
  });
  q.addEventListener('pointermove',e=>{
    if(id!==e.pointerId)return;
    const dx=e.clientX-x0, dy=e.clientY-y0;
    const vector = VOLUME_DRAG_VECTOR[stem];
    const dv=(dx*vector.x + dy*vector.y)/180;
    if(Math.abs(dx)>4 || Math.abs(dy)>4) moved=true;
    if(moved) setVolume(stem,v0+dv);
  });
  function release(e){
    if(id!==e.pointerId)return;
    try{q.releasePointerCapture(id);}catch(_){}
    if(!moved) toggleSolo(stem);
    id=null;
  }
  q.addEventListener('pointerup',release);
  q.addEventListener('pointercancel',release);
  // keyboard: Enter/Space = solo, arrows = volume
  q.addEventListener('keydown',e=>{
    if(!state.ready)return;
    if(e.key==='ArrowUp'||e.key==='ArrowRight'){setVolume(stem,state.volume[stem]+0.05);e.preventDefault();}
    else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setVolume(stem,state.volume[stem]-0.05);e.preventDefault();}
    else if(e.key==='Enter'||e.key===' '){toggleSolo(stem);e.preventDefault();}
  });
});

// overlay
function setProgressValue(p){
  const pct = clampPercent(Number(p) || 0);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progressbar').setAttribute('aria-valuenow', String(Math.round(pct)));
}
function showOverlay(t,m,p){
  const o=document.getElementById('overlay');
  o.classList.add('active');
  o.setAttribute('aria-busy','true');
  document.getElementById('ovTitle').textContent=t;
  document.getElementById('ovMsg').textContent=m;
  setProgressValue(p);
}
function hideOverlay(){
  const o=document.getElementById('overlay');
  o.classList.remove('active');
  o.setAttribute('aria-busy','false');
}
function prog(p,m){setProgressValue(p);if(m)document.getElementById('ovMsg').textContent=m;}

function setProcessing(active){
  state.processing = active;
  document.getElementById('modelMode').disabled = active;
  document.querySelectorAll('.sample-rows button').forEach((button)=>{button.disabled = active;});
}

function assertCurrentJob(jobId){
  if (jobId !== state.jobId) throw new Error('Processing was superseded by a newer file.');
}

async function useSampleTrack(track, button){
  if (state.processing) {
    alert('Please wait for the current separation to finish before loading another track.');
    return;
  }
  const label = button?.textContent || track.name;
  if (button) {
    button.disabled = true;
    button.textContent = `${track.name} (loading)`;
  }

  const trackUrl = new URL(track.url, location.href);
  if (location.protocol === 'http:' || location.protocol === 'https:') {
    if (trackUrl.origin !== location.origin) {
      hideOverlay();
      if (button) button.textContent = `${track.name} (blocked)`;
      alert(`Sample blocked by CORS policy. Please use a same-origin sample URL: ${track.url}`);
      button.disabled = false;
      if (button?.textContent.includes('(blocked)')) button.textContent = label;
      return;
    }
  }

  try{
    showOverlay('Loading Sample',`Downloading ${track.name}…`,10);
    const resp=await fetch(trackUrl.href);
    const ctype = resp.headers.get('content-type') || '';
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    if (ctype && !ctype.startsWith('audio/') && !ctype.includes('octet-stream')) {
      throw new Error(`Track is not an audio file (${ctype || 'unknown type'})`);
    }
    const blob=await resp.blob();
    if (!blob || !blob.size) {
      throw new Error('Sample file is empty.');
    }
    const file=new File([blob], track.name.replace(/[^\w.-]+/g,'_')+'.mp3', { type: blob.type || 'audio/mpeg' });
    await handleFile(file);
  }catch(e){
    hideOverlay();
    if (button) button.textContent = `${track.name} (failed)`;
    alert('Unable to load sample track: '+getErrorMessage(e));
  } finally {
    if (button) {
      if (!button.textContent.includes('(failed)')) {
        button.textContent = label;
      }
      button.disabled = false;
    }
  }
}

function buildSampleButtons(){
  const container = document.getElementById('sampleRows');
  if(!container)return;
  container.innerHTML='';
  SAMPLE_TRACKS.forEach(track=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.textContent = track.artist ? `${track.name} — ${track.artist}` : track.name;
    btn.addEventListener('click',()=>useSampleTrack(track, btn));
    container.appendChild(btn);
  });
}

// file handling
async function handleFile(file){
  if(state.processing){
    alert('Please wait for the current separation to finish before loading another track.');
    return;
  }
  const isAudioType = file && file.type ? file.type.startsWith('audio/') : false;
  const isAudioName = !!file && /\.(mp3|wav|m4a|aac|ogg|flac|opus|aiff)$/i.test(file.name||'');
  if(!file||!(isAudioType || isAudioName)){
    alert('Please drop an audio file (mp3, wav, flac, etc.).');
    return;
  }
  if(file.size > MAX_AUDIO_BYTES){
    alert(`This file is too large for in-browser separation. Please use an audio file under ${Math.round(MAX_AUDIO_BYTES / 1024 / 1024)} MB.`);
    return;
  }
  const jobId = ++state.jobId;
  setProcessing(true);
  stopPlayback();state.ready=false;state.pauseOffset=0;
  document.getElementById('deviceWrap').classList.remove('ready');
  document.getElementById('playbar').classList.remove('active');
  document.getElementById('stems-panel').classList.remove('active');
  document.getElementById('waveRow').classList.remove('active');
  setGlyph('upload');
  document.getElementById('centerHint').textContent='drop audio';
  document.getElementById('hint').textContent='Processing track';
  document.getElementById('filename').textContent=file.name;
  state.soloStem=null;
  updateSoloUI();
  STEMS.forEach(s=>{
    buffers[s]=null;
    state.loopDot[s]=-1;
    state.loopStart[s]=0;
    state.loopEnd[s]=0;
    document.querySelectorAll(`.loop-btn[data-stem="${s}"]`).forEach(btn=>{
      btn.classList.remove('on');
      btn.setAttribute('aria-pressed','false');
    });
    document.getElementById('varc-'+s).classList.remove('looping');
  });
  state.loopBase = 0;
  try{
    const requestedMode = getModelModeFromUi();
    setModelMode(requestedMode);

    const runSeparation = async (mode) => {
      const start = performance.now();
      const dur = await separateAudio(await file.arrayBuffer(), (p,m) => prog(p,m), mode);
      assertCurrentJob(jobId);
      bench[mode].separateMs = performance.now() - start;
      setBenchline();
      return dur;
    };

    if (requestedMode === 'better') {
      showOverlay('Loading Model', MODEL_PRESETS.better.loadLabel, 0);
      try {
        await ensureModelReady('better', (p,m) => prog(p,m));
      } catch (e) {
        console.warn('Model load failed, using fast mode:', e);
        const errMsg = getErrorMessage(e);
        const fallbackMsg = /timed out/i.test(errMsg)
          ? `ML model failed to load (${errMsg}); using fast mode`
          : 'ML model failed to load; using fast mode';
        showOverlay('Model fallback',fallbackMsg,5);
      }
    }

    const runMode = requestedMode === 'better' && !isBetterModelReady() ? 'fast' : requestedMode;
    setModelMode(runMode);
    showOverlay('Separating Stems',`Running ${MODEL_PRESETS[runMode]?.label || runMode} mode`,0);
    let dur;
    try {
      dur = await runSeparation(runMode);
    } catch (e) {
      if (requestedMode === 'better' && runMode !== 'fast') {
        console.warn('Better mode failed, using fast mode:', e);
        showOverlay('Fallback','Fallback to fast separation…',0);
        dur = await runSeparation('fast');
        setModelMode('fast');
      } else {
        throw e;
      }
    }

    assertCurrentJob(jobId);
    state.duration=dur;state.ready=true;hideOverlay();
    document.getElementById('playbar').classList.add('active');
    document.getElementById('stems-panel').classList.add('active');
    document.getElementById('waveRow').classList.add('active');
    document.getElementById('deviceWrap').classList.add('ready');
    setGlyph('play');document.getElementById('centerHint').textContent='play';
    document.getElementById('hint').textContent='Tap a quarter to solo · drag away from center to set its level';
    updateUI(0);
  }catch(e){
    console.error(e);
    hideOverlay();
    document.getElementById('hint').textContent='Drop a track to begin';
    alert('Error processing file: '+getErrorMessage(e));
  }
  finally {
    if (jobId === state.jobId) setProcessing(false);
    const input = document.getElementById('fileInput');
    if (input) input.value = '';
  }
}
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});

// drag & drop
const center=document.getElementById('center'), device=document.getElementById('device');
['dragenter','dragover'].forEach(ev=>document.body.addEventListener(ev,e=>{e.preventDefault();center.classList.add('drag-over');device.classList.add('drag-active');}));
['dragleave','drop'].forEach(ev=>document.body.addEventListener(ev,e=>{e.preventDefault();center.classList.remove('drag-over');device.classList.remove('drag-active');if(ev==='drop'&&e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);}));

// init
setBenchline();
buildDevice();  // arcs are viewBox SVG; build once, they scale automatically
buildSampleButtons();
document.getElementById('modelMode').addEventListener('change', () => {
  setModelMode(getModelModeFromUi());
});
setModelMode(state.modelMode);
let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{if(state.ready)STEMS.forEach(s=>drawWave(s));},150);});
</script>
