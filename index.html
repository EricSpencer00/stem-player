<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stemacle</title>
<meta name="description" content="Stemacle releases: web app, macOS downloads, iOS status, and source.">
<link rel="icon" type="image/png" href="/assets/stemacle-tentacle.png">
<link rel="apple-touch-icon" href="/assets/stemacle-tentacle.png">
<meta property="og:title" content="Stemacle">
<meta property="og:description" content="Stemacle releases: web app, macOS downloads, iOS status, and source.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://stemacle.com/">
<script>
  (() => {
    if (window.location.pathname.startsWith('/stem-player')) {
      const tail = window.location.pathname.replace(/^\/stem-player\/?/, '');
      const suffix = tail ? '/' + tail : '';
      const destination = 'https://stemacle.com/app' + suffix + window.location.search + window.location.hash;
      window.location.replace(destination);
    }
  })();
</script>
<style>
:root {
  --paper: oklch(93% 0.012 84);
  --paper-raised: oklch(96% 0.009 84);
  --ink: oklch(17% 0.012 64);
  --ink-soft: oklch(39% 0.012 67);
  --ink-faint: oklch(56% 0.01 70);
  --line: oklch(63% 0.012 73 / 0.44);
  --plum: oklch(28% 0.082 320);
  --shadow: oklch(22% 0.012 64 / 0.14);
  --font-tight: "Helvetica Neue Condensed Bold", "Arial Narrow", "Liberation Sans Narrow", Arial, sans-serif;
  --font-ui: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100svh;
  background:
    linear-gradient(oklch(17% 0.012 64 / 0.035) 1px, transparent 1px),
    radial-gradient(88% 68% at 18% -12%, oklch(72% 0.045 318 / 0.28) 0%, transparent 48%),
    radial-gradient(92% 74% at 110% 4%, oklch(98% 0.006 84 / 0.88) 0%, transparent 52%),
    var(--paper);
  background-size: 100% 13px, auto, auto, auto;
  color: var(--ink);
  font-family: var(--font-ui);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

a {
  color: inherit;
  text-decoration: none;
}

a:focus-visible {
  outline: 2px solid var(--plum);
  outline-offset: 4px;
}

img {
  display: block;
  max-width: 100%;
}

.release-shell {
  width: min(100%, 1640px);
  min-height: 100svh;
  margin: 0 auto;
  padding: 18px;
}

.release-nav {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: start;
  gap: 14px;
  min-width: 0;
  padding-bottom: 16px;
}

.release-mark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.release-mark img {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  object-fit: cover;
  box-shadow: 0 7px 18px var(--shadow);
}

.release-mark span,
.release-nav a,
.release-card small,
.release-meta,
.release-footer {
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  line-height: 1.25;
  text-transform: uppercase;
}

.release-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px 14px;
  min-width: 0;
}

.release-nav a {
  border-bottom: 1px solid transparent;
}

.release-nav a:hover {
  border-color: currentColor;
}

.release-shelf {
  display: grid;
  gap: 18px;
}

.release-title {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: end;
  gap: 16px;
  min-width: 0;
  border-top: 1px solid var(--line);
  padding-top: clamp(24px, 5vw, 56px);
}

h1 {
  margin: 0;
  color: var(--plum);
  font-family: var(--font-tight);
  font-size: clamp(60px, 16vw, 246px);
  font-stretch: condensed;
  font-weight: 900;
  letter-spacing: 0;
  line-height: 0.78;
  overflow-wrap: anywhere;
  text-transform: uppercase;
}

.release-meta {
  justify-self: end;
  padding-bottom: clamp(5px, 1.2vw, 18px);
  text-align: right;
}

.release-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr));
  gap: 16px;
  min-width: 0;
}

.release-card {
  position: relative;
  display: grid;
  grid-template-rows: auto minmax(112px, 1fr);
  min-width: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  background: oklch(95% 0.009 84 / 0.72);
  box-shadow: 0 18px 50px oklch(22% 0.012 64 / 0.08);
  transition:
    border-color 160ms cubic-bezier(0.22, 1, 0.36, 1),
    transform 160ms cubic-bezier(0.22, 1, 0.36, 1),
    background 160ms cubic-bezier(0.22, 1, 0.36, 1);
}

.release-card:hover {
  border-color: oklch(41% 0.036 310 / 0.66);
  background: var(--paper-raised);
  transform: translateY(-2px);
}

.release-art {
  position: relative;
  aspect-ratio: 1;
  min-width: 0;
  overflow: hidden;
  background: oklch(88% 0.015 82);
}

.release-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.release-art:not(.app-icon-art) img {
  mix-blend-mode: multiply;
}

.release-art.app-icon-art {
  display: grid;
  place-items: center;
}

.release-art.app-icon-art img {
  width: 78%;
  height: 78%;
  object-fit: contain;
  border-radius: 18%;
  box-shadow: 0 18px 38px oklch(22% 0.012 64 / 0.18);
  mix-blend-mode: normal;
}

.release-card[data-release="github"] .release-art img {
  filter: saturate(0.92) contrast(1.06);
}

.release-card[data-release="github"] strong {
  font-size: clamp(34px, 3.1vw, 46px);
}

.release-copy {
  display: grid;
  align-content: space-between;
  gap: 18px;
  min-width: 0;
  padding: 14px;
}

.release-card strong {
  display: block;
  min-width: 0;
  color: var(--ink);
  font-family: var(--font-tight);
  font-size: clamp(34px, 3.8vw, 56px);
  font-stretch: condensed;
  font-weight: 900;
  letter-spacing: 0;
  line-height: 0.82;
  overflow-wrap: anywhere;
  text-transform: uppercase;
}

.release-card small {
  display: block;
}

.release-footer {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  min-width: 0;
  border-top: 1px solid var(--line);
  padding-top: 15px;
}

.release-footer span {
  min-width: 0;
  overflow-wrap: anywhere;
}

footer {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  min-width: 0;
  padding-top: 18px;
}

footer a {
  border-bottom: 1px solid transparent;
}

footer a:hover {
  border-color: currentColor;
}

@media (max-width: 760px) {
  .release-nav,
  .release-title,
  footer {
    grid-template-columns: 1fr;
  }

  .release-links {
    justify-content: flex-start;
  }

  .release-meta {
    justify-self: start;
    text-align: left;
  }
}

@media (max-width: 560px) {
  .release-shell {
    padding: 12px;
  }

  .release-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .release-card {
    grid-template-rows: auto auto;
    max-width: 100%;
  }

  .release-card strong {
    font-size: clamp(34px, 10vw, 44px);
    line-height: 0.9;
  }

  .release-card .release-footer {
    justify-content: flex-start;
  }

  footer {
    flex-direction: column;
  }
}
</style>
</head>
<body>
<div class="release-shell">
  <nav class="release-nav" aria-label="Release links">
    <a class="release-mark" href="/" aria-label="Stemacle home">
      <img src="/assets/stemacle-tentacle.png" alt="" aria-hidden="true">
      <span>stemacle</span>
    </a>
    <div class="release-links">
      <a href="https://stemacle.com/app/">web</a>
      <a href="https://github.com/EricSpencer00/stem-player/releases/download/v0.2.0/Stemacle-0.2.0-arm64.dmg">mac dmg</a>
      <a href="https://github.com/EricSpencer00/stem-player/releases/download/v0.2.0/Stemacle-0.2.0-arm64-mac.zip">mac zip</a>
      <a href="/ios-coming-soon/">get for ios</a>
      <a href="https://github.com/EricSpencer00/stem-player">source</a>
    </div>
  </nav>

  <main class="release-shelf" aria-labelledby="title">
    <header class="release-title">
      <h1 id="title">STEMACLE</h1>
      <div class="release-meta">v0.2.0<br>local stems</div>
    </header>

    <section class="release-grid" aria-label="Stemacle releases">
      <a class="release-card" data-release="web" href="https://stemacle.com/app/" aria-label="open web app">
        <span class="release-art">
          <img src="/assets/release-icons/stemacle-release-icon-01.png" alt="">
        </span>
        <span class="release-copy">
          <span>
            <small>web</small>
            <strong>web app</strong>
          </span>
          <span class="release-footer"><span>browser</span><span>live</span></span>
        </span>
      </a>

      <a class="release-card" data-release="mac-dmg" href="https://github.com/EricSpencer00/stem-player/releases/download/v0.2.0/Stemacle-0.2.0-arm64.dmg">
        <span class="release-art">
          <img src="/assets/release-icons/stemacle-release-icon-03.png" alt="">
        </span>
        <span class="release-copy">
          <span>
            <small>macOS</small>
            <strong>mac dmg</strong>
          </span>
          <span class="release-footer"><span>arm64</span><span>v0.2.0</span></span>
        </span>
      </a>

      <a class="release-card" data-release="mac-zip" href="https://github.com/EricSpencer00/stem-player/releases/download/v0.2.0/Stemacle-0.2.0-arm64-mac.zip">
        <span class="release-art">
          <img src="/assets/release-icons/stemacle-release-icon-02.png" alt="">
        </span>
        <span class="release-copy">
          <span>
            <small>macOS</small>
            <strong>mac zip</strong>
          </span>
          <span class="release-footer"><span>arm64</span><span>bundle</span></span>
        </span>
      </a>

      <a class="release-card" data-release="ios" href="/ios-coming-soon/">
        <span class="release-art app-icon-art">
          <img src="/assets/stemacle-tentacle.png" alt="">
        </span>
        <span class="release-copy">
          <span>
            <small>iOS</small>
            <strong>ios</strong>
          </span>
          <span class="release-footer"><span>native</span><span>page</span></span>
        </span>
      </a>

      <a class="release-card" data-release="github" href="https://github.com/EricSpencer00/stem-player/releases/latest" aria-label="Latest GitHub release">
        <span class="release-art">
          <img src="/assets/release-icons/stemacle-release-icon-05.png" alt="">
        </span>
        <span class="release-copy">
          <span>
            <small>GitHub</small>
            <strong>release</strong>
          </span>
          <span class="release-footer"><span>notes</span><span>assets</span></span>
        </span>
      </a>

      <a class="release-card" data-release="repo" href="https://github.com/EricSpencer00/stem-player">
        <span class="release-art">
          <img src="/assets/release-icons/stemacle-release-icon-06.png" alt="">
        </span>
        <span class="release-copy">
          <span>
            <small>source</small>
            <strong>repo</strong>
          </span>
          <span class="release-footer"><span>repo</span><span>source</span></span>
        </span>
      </a>
    </section>
  </main>

  <footer class="release-footer" aria-label="Stemacle footer">
    <span>Eric Spencer</span>
    <span><a href="https://ericspencer.us/">ericspencer.us</a> <a href="https://stemacle.com/app/">web app</a> <a href="https://github.com/EricSpencer00/stem-player/releases/latest">release</a></span>
  </footer>
</div>
</body>
</html>
