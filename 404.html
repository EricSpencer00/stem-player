<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <script>
    (function stemPlayerFallbackRedirect() {
      const path = window.location.pathname || '';

      if (path === '/stem-player' || path.startsWith('/stem-player/')) {
        const tail = path.replace(/^\/stem-player\/?/, '');
        const destination = `https://stemacle.com/app/${tail}${window.location.search}${window.location.hash}`;
        window.location.replace(destination);
        return;
      }

      if (window.location.hostname.endsWith('ericspencer.us') && (path === '/app' || path.startsWith('/app/'))) {
        const tail = path.replace(/^\/app\/?/, '');
        const destination = `https://stemacle.com/app/${tail}${window.location.search}${window.location.hash}`;
        window.location.replace(destination);
        return;
      }

      if (window.location.pathname) {
        window.location.replace('https://ericspencer.us');
      }
    })();
  </script>
</head>
<body>
  <p>Not found. Redirecting to Stemacle.</p>
</body>
</html>
