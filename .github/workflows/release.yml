name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (for example v0.2.0)'
        required: true
        type: string

# NOTE: desktop release packaging is intentionally not wired up. The old disk-image
# path built a now-removed SwiftPM macOS target via an Electron packager; both were
# deleted in the native rewrite. The current surfaces build differently:
#   - macOS/iOS: native/apple via xcodebuild (iOS release: scripts/ios-release.sh)
#   - Windows/Linux: native/desktop (Slint) via cargo
# A real signed/notarized desktop release job should be (re)built on those when
# packaging is ready. Until then this workflow only runs the verification gate so
# tagging a release still proves the tree is green.

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Prepare site bundle
        run: npm run site:prepare
