name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required site + native surfaces exist
        run: |
          # Web gold master + landing.
          test -f index.html
          test -f app/index.html
          test -f apps/stem-shuffle/index.html
          test -f wrangler.toml
          test -f PRODUCT.md
          test -f LOOP_SAMPLING.md
          test -f samples/stem-sample-1.mp3
          test -f samples/stem-sample-2.mp3
          test -f samples/stem-sample-3.mp3
          test -f tests/stem-player.test.mjs
          # Current native surfaces (the rewrite, not the old electron/capacitor shells).
          test -f native/apple/project.yml
          test -f native/core/Cargo.toml
          test -f native/desktop/Cargo.toml

      - name: Check inline splitter script syntax
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const vm = require('vm');

          const html = fs.readFileSync('app/index.html', 'utf8');
          const match = html.match(/<script>\s*'use strict';([\s\S]*)<\/script>/);

          if (!match) {
            throw new Error('Unable to find the inline app script in app/index.html');
          }

          new vm.Script(`'use strict';${match[1]}`);
          NODE

      - name: Run regression tests
        run: npm test

      - name: Prepare Cloudflare Pages artifact
        run: npm run site:prepare
