name: Validate and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required site files exist
        run: |
          test -f index.html
          test -f app/index.html
          test -f apps/stem-shuffle/index.html
          test -f native/index.html
          test -f native/electron/main.cjs
          test -f native/ios/App/App.xcodeproj/project.pbxproj
          test -f native/ios/App/App/Info.plist
          test -f capacitor.config.json
          test -f wrangler.toml
          test -f PRODUCT.md
          test -f LOOP_SAMPLING.md
          test -f samples/stem-sample-1.mp3
          test -f samples/stem-sample-2.mp3
          test -f samples/stem-sample-3.mp3
          test -f tests/stem-player.test.mjs

      - name: Check inline splitter script syntax
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const vm = require('vm');

          const html = fs.readFileSync('app/index.html', 'utf8');
          const match = html.match(/<script>\s*'use strict';([\s\S]*)<\/script>/);

          if (!match) {
            throw new Error('Unable to find the inline app script in app/index.html');
          }

          new vm.Script(`'use strict';${match[1]}`);
          NODE

      - name: Run regression tests
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: npm test

      - name: Prepare Cloudflare Pages artifact
        run: npm run site:prepare

      - name: Prepare native app artifact
        run: npm run native:prepare

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: true

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
