name: Stemacle
options:
  bundleIdPrefix: com.stemacle
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  StemacleKit:
    path: StemacleKit

settings:
  base:
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  StemacleMac:
    type: application
    platform: macOS
    sources:
      - path: Stemacle
    dependencies:
      - package: StemacleKit
        product: StemacleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stemacle.mac
        PRODUCT_NAME: Stemacle
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Stemacle/Resources/Info-macOS.plist
      properties:
        CFBundleDisplayName: Stemacle
        LSApplicationCategoryType: public.app-category.music
        NSMicrophoneUsageDescription: Stemacle uses the microphone to record over separated stems.
        NSHumanReadableCopyright: © Eric Spencer

  StemacleiOS:
    type: application
    platform: iOS
    sources:
      - path: Stemacle
    dependencies:
      - package: StemacleKit
        product: StemacleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stemacle.ios
        PRODUCT_NAME: Stemacle
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Stemacle/Resources/Info-iOS.plist
      properties:
        CFBundleDisplayName: Stemacle
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: Stemacle uses the microphone to record over separated stems.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
